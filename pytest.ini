[pytest]
testpaths = tests testing
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --json-report --json-report-file=testing/results/latest.json
markers =
    unit: pure-unit tests with mocked dependencies
    security: security-focused tests (auth, RBAC, injection, HMAC, crypto, infra)
    authz: authorization / RBAC / privilege-escalation tests
    api_security: injection, XSS, SSRF, path-traversal API-level tests
    llm_safety: prompt-injection, output-sanitization, LLM/RAG safety tests
    infra: infrastructure config, subprocess safety, serializer audit
    regression: regression tests for previously fixed defects
    integration: cross-component integration tests
    e2e: end-to-end user-journey tests
    fuzz: property-based / fuzz tests via Hypothesis
    concurrency: race-condition / threading tests
    resilience: upstream-degradation / quota-boundary (429/503/timeout) tests
    chaos: fault-injection / chaos tests
    slow: tests that take > 1s; skipped by default in local quick runs
    live_llm: hits real LLM endpoints; gated by RUN_LIVE_LLM=1
    ai_governance: ai governance module tests (guardrails, observability, fairness, XAI, evaluation)
    smoke: route-level smoke tests — happy path + required validation (fast, no external calls)
    idempotency: duplicate-submission and retry-safety tests
    state: partial-failure, rollback, and state-consistency tests
    contract: response body schema and API contract validation
    payload: advanced malicious payload tests beyond basic injection
    llm_attack: prompt injection, jailbreak, and LLM-specific attacks
    business: business logic abuse and privilege-escalation tests
    owasp: OWASP Top 10 API Security vulnerability tests
    ml_owasp: OWASP Machine Learning Top 10 vulnerability tests
    cwe: SANS/CWE Top 25 vulnerability tests
