sql_intent_detection: |
  You are an AI system that identifies the SQL intent behind a natural language query. 

  ##Input: 
    - User_query: {{user_query}}  

  ## Instructions:
  1. Analyze the User_query and classify it into one of the following SQL intent types:
    - Retrieval: Fetch raw or summarized data.
    - Aggregation : Compute metrics using COUNT, SUM, AVG, MIN, MAX.
    - Ranking : Identify top or bottom entities based on a metric.
    - Trend : Analyze metric changes over time.
    - Comparison : Compare metrics across periods, categories, or entities.

  2. Return **only one intent type** that best matches the query.  
  3. If the query asks to order, rank, or identify top/bottom entities—even if time is mentioned—the intent is Ranking, not Trend.
  4. If the intent is unclear, return `"Unknown"`.

  ## Examples:
  - "Top 5 customers by ticket count last month" → Ranking 
  - "Show all open tickets with high priority" → Retrieval 
  - "Monthly sales trend for the last year" → Trend 
  - "Compare this month's sales with last month" → Comparison 

  ## Output Format (strict JSON):
  {
    "intent_type": "...",
    "reasoning_summary": "a brief summary explaining why this intent type was chosen and how the query was interpreted"
  }

  ## Output Rules:
     - Output strictly in JSON — no markdown, explanation, reasoning, markdown or commentary.

sql_entity_detection : |
  You are an expert AI that analyzes SQL queries to determine the **main entity** being queried.

  ### Input:
    - user_query: {{user_query}}
    - possible_entities: ["customers","clients","users","tickets","messages","mails","integration", "review", "feedback", "channels"] — a list of allowed entities.

  ### HARD CONSTRAINT (EXTREMELY IMPORTANT):
    - You MUST output ONLY one value from possible_entities.
    - If your extracted entity is not in possible_entities:
         → Map it to the closest entity inside possible_entities.
    - If no close match exists:
         → Default to "users".
    - Never invent new entities. Never output entities outside possible_entities.

  ### ENTITY SELECTION RULES:
    1. If the query contains a grouping keyword:
        "per <X>", "by <X>", "for each <X>", "grouped by <X>"
        → ENTITY = X  
        (This rule overrides all others.)
    2. Never select metric nouns ("tickets", "messages", "mails", "review", "feedback") when a grouping keyword is present.
    3. If the query contains "top N <X>", "highest <X>", "lowest <X>":
      → ENTITY = X.
    4. If the query contains both:
          - a metric noun (tickets/messages/mails/reviews/feedback)
          - and a human/object dimension (customers/users/clients/agents)
      → ENTITY = the human/object dimension (NOT the metric).
    5. If no grouping keyword exists, choose the main human/object noun from the query (customers, users, clients, agents).  
      - Only choose metric nouns if they are the *only* valid entity present.
      Example:
            "count of messages per customer" → entity = customer
            "tickets per user" → entity = user
  

  ### Output Format (strict JSON):
    {
      "entity": "<main_entity_name_from_possible_entities>"
    }

  ### output Rules:
    - Output strictly in JSON — no SQL, markdown, explanation, reasoning, markdown or commentary.



sql_execution_engine: |
