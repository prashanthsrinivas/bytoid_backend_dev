    - **Subquery Rule for Ranking Cases:**
      - In cases where the user query requests *top entities* (e.g., top customers, top users, top performers) and a *grouping or time-based trend* (e.g., grouped by day/week/month),
        always use a **subquery in the WHERE clause** to first determine the top entities (based on total metric value, such as total tickets).
      - The main query should then return the **time-based or grouped breakdown** for only those top entities.
      - Example:
        ```sql
        SELECT 
            DATE_FORMAT(t.created_in, '%%Y-%%m-%%d') AS day,
            c.first_name AS customer_name,
            COUNT(t.ticket_id) AS open_tickets
        FROM tickets AS t
        JOIN customers AS c ON t.customer_id_fk = c.customer_id
        WHERE t.status = 'Open'
          AND c.customer_id IN (
              SELECT c2.customer_id
              FROM tickets AS t2
              JOIN customers AS c2 ON t2.customer_id_fk = c2.customer_id
              WHERE t2.status = 'Open'
              GROUP BY c2.customer_id
              ORDER BY COUNT(t2.ticket_id) DESC
              LIMIT 3
          )
        GROUP BY day, c.first_name
        ORDER BY day;
