  - sql_params : {{sql_params}}
  - database_schema: {{database_schema}}

  ## Your Task:
  Attempt to EXECUTE the given SQL against the provided schema.

  ## Execution Rules:
  1. Validate the SQL strictly against the schema:
    - All tables must exist.
    - All columns must exist.
    - All referenced aliases must be valid.
    - All JOIN conditions must use real columns.
    - Check GROUP BY correctness.
    - Check ORDER BY correctness.
    - Check LIMIT syntax.
    - Check for SQL injection patterns.
    - Check aggregation correctness (no ungrouped columns).
    - Ensure WHERE, HAVING, JOIN, and SELECT expressions are valid.
    - Recursively validate all subqueries, CTEs, and derived tables.
    - Ensure every column in every WHERE, HAVING, JOIN, and SELECT expression exists in the referenced table.
    - Ensure aliases and column references in subqueries are correct within their scope.

  2.- Perform a full **syntactic + semantic validation**.
    - Simulate execution.
    - Determine whether the query would run successfully.

  ## Output Format (Strict JSON):
  {
    "success": true/false,
    "error": "<brief error message about which table or column had error or null>"
  }

  ## Output Rules:
  - **Strict JSON Only**: No markdown, explanations, or commentary outside the JSON.
  - If SQL is valid → success = true, error = null.
  - If SQL is invalid → success = false and include a short root-cause error.
  - Do NOT modify the SQL.
  - Do NOT suggest fixes.


clarification_prompt_1: |
  You are an expert in **user intent clarification** for an AI reporting system that converts natural language queries into structured SQL and charts.

  ### Goal:
  1. Evaluate the `decomposed_query` to determine if all details required for SQL generation are present.
  2. Do **not** assume, infer, or auto-fill any missing values.
  3. If any required details is missing or ambiguous, generate clarification questions to obtain them.
  4. Use `database_schema` and `primary_search_table` to validate fields and ensure schema correctness.
  5. Generate a **confidence score** based on completeness.

  ### 🧩 Input:
  - database_schema: {{database_schema}}
  - primary_search_table: {{primary_search_table}}
  - decomposed_query: {{decomposed_query}}   # may contain confirmed or partial information
  - filters_possible: {{filters_possible}}   # enum-based filters available per table and column


  ### Validation & Reasoning Steps

  1. check_completeness:
       - Inspect `decomposed_query` to identify missing or null fields among:
         - table
         - columns
         - filters
         - aggregation
         - grouping_dimension
         - ordering
         - limit
         - time_range (if time-based metric implied)
       - Do not infer or merge — simply check for presence and validity.

  2. schema_validation:
       - Validate any non-empty fields against `database_schema`.
       - If a column, table, or aggregation is invalid or unrecognized, mark it as missing and generate a clarification question.

  3. missing_info_detection:
      - Detect **all** missing, null, or unclear fields in `decomposed_query.semantic`.
      - Generate clarification questions and possible options for **each** missing field, up to a total of 5 questions .
      - If `filters` is empty or null:
         - Use **only** `filters_possible` to generate clarification questions.
         - Do **not** create or suggest filters not present in `filters_possible`.
         - For each enum-type column in `filters_possible`, form a natural question:
             “Which [column_name] values do you want to include?”
         - Use its possible enum values as options.
         - Always include “None” if relevant.
         - When generating clarification questions for filters, use only the column name (e.g., priority, status) from filters_possible and do not include the table name (e.g., avoid service_requests_priority).
     - Do not infer or invent new filters such as customer type, region, or channel unless they exist in `filters_possible`.
     - For other missing fields (e.g., table, aggregation, time_range), follow standard question generation rules.

  4. Question pattern:
    For questions about metric, use the format  "How do you want to measure .....?"/ "What should I look at .....?" 
    For questions about aggregation, use the format  "How do you want me to figure it out .....?" / "how should I find it....?"

  5. avoid_repetitive_questions: |
    - Never repeat the same question or ask multiple questions for the same missing field. 
    - Ask once per unique missing field only. 

  ### Output rule:
   - **Strict JSON Only**: No markdown, explanations, or commentary outside the JSON.

  ### Output Format:
  {
    "missing_info": ["list of missing or ambiguous elements"],
    "collected_info":["list of confirmed elements from decomposed_query"],
    "confidence_score": "value_between_0_and_1",
    "clarifications": [
      {
        "question": "text describing missing or ambiguous info",
        "options": ["option1", "option2", "..."]
      }
    ],
    "sql_ast": null / full,
    "reasoning_summary":"explanation of what’s missing or why SQL AST cannot yet be generated, briefly describe from where did you get the source for each filters for asking the clarification questions"
  }

  ### Example Iterative Behavior

  **Iteration 1 Input:**
  user_query: "Top customers by number of tickets"
  decomposed_query: {
    "semantic": {
      "table": null,
      "aggregation": null,
      "columns": [],
      "time_range": null
    }
  }
  → Output:
  {
    "missing_info": ["table", "aggregation", "time_range"],
    "confidence_score": 0.55,
    "clarifications": [
      {"question": "Which table should be used for this query?", "options": ["tickets", "customers"]},
      {"question": "What metric should be counted?", "options": ["number of tickets", "total revenue"]},
      {"question": "For what time range do you want to see results?", "options": ["Last Week", "Last Month", "All Time"]}
    ],
    "sql_ast": null,
    "reasoning_summary": "Key semantic elements like table, aggregation, and time range are missing; cannot build SQL AST yet."
    
  }

  **Iteration 2 Input:**
  user_query: "Top customers by number of tickets last month"
  decomposed_query: {
    "semantic": {
      "table": "tickets",
      "aggregation": "count",
      "columns": ["customer_account_id", "ticket_id"],
      "time_range": {"start_date": "2025-10-01", "end_date": "2025-10-31"},
      "grouping_dimension": "customer_account_id",s
      "ordering": [{"column": "count(ticket_id)", "direction": "DESC"}],
      "limit": 10
    }
  }
  → Output:
  {
    "missing_info": [],
    "confidence_score": 0.99,
    "clarifications": [],
    "sql_ast": { ... valid SQL AST ... },
    "reasoning_summary": "All required semantic elements are confirmed; SQL AST generated successfully."
    
  }

clarification_prompt_2: |
  You are an expert in **user intent clarification** for an AI reporting system that converts natural language queries into structured SQL and charts.

  ### Goal:
  1. Evaluate the `decomposed_query` to determine if all details required for SQL generation are present.
  2. Do **not** assume, infer, or auto-fill any missing values.
  3. Only generate clarification questions for fields that are missing, null, empty, or invalid.
  4. Use `database_schema` and `primary_search_table` to validate fields and ensure schema correctness.
  5. Generate a **confidence score** based on completeness.
  6. Treat any value provided in `decomposed_query` as confirmed **unless it is null, empty, or clearly invalid**.
  7. Only generate `sql_ast` if **confidence ≥ 0.97** and all required details are confirmed.

  ### 🧩 Input:
  - database_schema: {{database_schema}}
  - primary_search_table: {{primary_search_table}}
  - decomposed_query: {{decomposed_query}}   # may contain confirmed or partial information

  ### Validation & Reasoning Steps

  1. check_completeness:
    - Inspect `decomposed_query` for missing, null, or empty fields.
    - **If a field has a non-null, non-empty value, consider it CONFIRMED and do NOT ask for clarification.**
    - Only mark as missing if:
      * The field is null
      * The field is an empty string ""
      * The field is an empty list []
    - Fields to check:
      - intent_type (if present and not null → CONFIRMED)
      - entity (if present and not null → CONFIRMED)
      - metric (if present and not null → CONFIRMED)
      - aggregation (if present and not null → CONFIRMED)
      - ranking_direction (if present and not null → CONFIRMED)
      - tables (if present and not empty → CONFIRMED)
      - columns (if present and not empty → CONFIRMED)
      - grouping_dimension (if present → CONFIRMED)
      - limit (if present → CONFIRMED)
      - time_range (if present → CONFIRMED)

  2. schema_validation:
   - Only validate aggregation functions and filter values against schema.
   - Do NOT validate tables or columns. Treat them as confirmed if provided.

  3. missing_info_detection:
   - Detect missing, null, or unclear fields in `decomposed_query`.
   - Only generate clarification questions for truly missing or invalid data.
   - Limit to maximum 5 clarification questions per iteration.

  4. confidence_scoring:
       - Start at 1.0.
       - Deduct 0.25 for each **core missing element**:
         (table, aggregation, metric/columns, time_range when required)
       - Deduct 0.15 for each **minor missing element**:
         (ordering, grouping_dimension, limit)
       - Cap confidence at 0.5 if >4 clarifications are needed.
       - If any missing elements remain, confidence ≤ 0.95.
       - Confidence ≥ 0.85 only if all required information is present and validated.

  5. iteration_awareness:
       - Explain what’s missing and why clarification is needed.

  ### CRITICAL RULE:
  - If `decomposed_query` contains a field with a value (not null, not empty), 
    **NEVER** generate a clarification question for that field.
  - Example: If `intent_type: "ranking"` is present, DO NOT ask "What is the exact intent type?"

  ### Output rule:
   - **Strict JSON Only**: No markdown, explanations, or commentary outside the JSON.

  ### Output Format:
  {
    "missing_info": ["list of missing or ambiguous elements"],
    "collected_info":["list of confirmed elements from decomposed_query"],
    "clarifications": [
      {
        "question": "text describing missing or ambiguous info",
        "options": ["option1", "option2", "..."]
      }
    ],
    "reasoning_summary":"briefly describe from where did you get the source for each filters for asking the clarification questions and wsa the value of filters were valid or not"
  }

