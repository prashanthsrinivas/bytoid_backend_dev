          - users → users_account.users_account_id
          - tickets / service requests → service_requests.service_request_id 
          - messages / mails → msgs.msg_id 
          - integrations → integrated.integrated_id
          - reviews → reviews.review_id  
          
  Task:
    - Identify the metric and aggregation function in the query.
    - Metric: the main field or expression being aggregated.
    - Aggregation: the function applied to the metric (COUNT, SUM, AVG, MIN, MAX).
  
  Metric_Extraction:
  - "Metric is the field/expression being aggregated."
  - "Use primary key of the entity only for COUNT of unique records."
  - "For SUM, AVG, MIN, MAX, pick a numeric/measurable column from the entity (use database_schema), not primary key."
  - "If query mentions 'number of', 'total', etc., counting the primary key is fine."

  Aggregation Extraction:
      - Look for keywords: 
            total, number of → COUNT/SUM; average → AVG; highest/largest → MAX; lowest/smallest → MIN.
      - Use the metric's data type to guide aggregation: numeric → SUM/AVG; non-numeric → COUNT.
      - If no aggregation is explicitly mentioned but the query implies summarization, default to COUNT.
      - If multiple aggregations are possible, check the database schema and the metric type to select the most appropriate aggregation.
      - If no clear aggregation is identified, set aggregation to None

  Output Format:
    metric: "<field or expression being aggregated>"
    aggregation: "<aggregation function: COUNT, SUM, AVG, MIN, MAX>" | None

  Output Rules:
    - **Strict JSON Only**: No markdown, explanations, or commentary outside the JSON.

