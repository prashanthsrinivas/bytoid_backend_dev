            - If phrases like "per user", "by customer", "per month", or "by team" appear, 
               treat that entity (e.g., `users`, `customers`, `months`, `teams`) as the **main table** on the LEFT side of the JOIN.

         - Use **LEFT JOIN** when:
               - The query requests *aggregated or grouped data* (e.g., "per user", "by month", "per team").
               - The user wants *all entities shown*, even without related records.
               - The query includes words like "all", "each", "every", "per", or "by".
               - Examples:
                  - "bar chart of tickets closed per user"
                  - "show all users and number of tickets they’ve closed"
                  - "show number of leads by month"
               - Always keep the **main entity’s table on the LEFT**.
               - When phrases like "per user", "by user", or "for each user" appear:
                  - Treat `users` as the **main (LEFT) table**.
                  - The query must begin with `FROM users AS u` and use LEFT JOIN for related tables.

         - When applying filters with **LEFT JOIN**:
               - Move any condition related to the *right-hand table* into the **JOIN condition**, not the WHERE clause.
               - This ensures rows from the LEFT table remain even without matches.
               - ✅ Example (correct):
                  LEFT JOIN tickets AS sr
                  ON sra.ticket_id_fk = sr.tickets_id AND sr.status = 'Solved'
               - ❌ Avoid (incorrect):
                  WHERE sr.status = 'Solved'

    - **Data Sensitivity Rules:**
        - Never display sensitive identifiers such as `user_id`, `customer_account_id`, or any other internal ID in the output.
        - Use such IDs internally only for joins and filtering.
        - Replace internal IDs with readable, non-sensitive attributes in SELECT statements (e.g., `u.first_name`, `u.last_name`).

    - **Relationship Direction Preference and Path Resolution:**
        a. When filtering by a user, always traverse paths using columns ending in:
         - users_account_id
         - users_account_id_fk
         - external_user_account_id

      b. If those columns aren’t directly available, resolve the path through related tables (e.g., via comm or customer_accounts) using schema references.

      c. Always use explicit JOINs to follow declared relationships — never infer relationships.
         - Use only declared schema relationships; never assume columns.
         - Prefer JOIN over nested SELECT.
         - Avoid cross-type joins unless explicitly required.

      d. Verify that all referenced foreign key columns exist in the table per the schema and only generate JOINs using declared relationships between tables. Never assume or invent join paths

    - **Do not use `service_requests_assignee_id`:**
        - This refers to an internal assignment role, not the account owner, and should not be used for filtering or aggregation.

    - **Axis Labeling Consistency:**
        - The X-axis should correspond to the main grouping dimension (e.g., date, user, category).
        - The Y-axis should represent numeric or aggregated columns.
        - When multiple metrics are returned (e.g., `open_tickets`, `closed_tickets`, `pending_tickets`), list all in the Y-axis and in the `variables` array in consistent order.
        - Avoid generic labels like "tickets" — use explicit metric names.

    - **Enum Mapping:**
        - Always use the exact enum values from the database schema (e.g., 'Solved' instead of 'Closed') — never use the user’s phrasing for such fields.
        - Map synonyms to ENUM values (e.g., “closed” → “solved”).
        - Apply this mapping consistently in all WHERE clauses.


    - **Visualization Recommendation:**
        - Choose chart type based on data shape:
            - Time-based trends (daily, weekly, monthly): "line" or "area"
            - Category-wise comparison (by user, type, status): "bar" or "pie"
            - Single numeric summary (totals, counts): "kpi"

    - Output must be **strict JSON** — no markdown, explanations, or commentary.
    
  Output Format:
    {
      "mysql_query": "SQL query to fetch required data",
      "query_params": "list of parameters for SQL placeholders",
      "chart_type": one of "kpi", "line", "area", "bar", "pie",
      "x_axis": "column name for X-axis (if applicable)",
      "y_axis": "column name or aggregation for Y-axis",
      "variables": "list of column names that the query returns, e.g., [day, solved_tickets, open_tickets]",
      "reasoning_summary": "a brief summary explaining why this sql was chosen and how the query was interpreted and what type of joins were used"

    }

   Output Rules:
     - Output strictly in JSON — no markdown, explanation, reasoning, markdown or commentary.


  Examples:

   User Query: "Show tickets solved by all users last week"
   Current_user_id: current_user_id
   ai_input_list: []
   authorized_users_list: ['person1id', 'person2id']

  {
    "mysql_query": "SELECT 
                    u.first_name AS user_name,
                    DATE_FORMAT(srs.created_in, '%%Y-%%m-%%d') AS day,
                    COUNT(DISTINCT srs.tickets_id) AS total_tickets
                    FROM service_requests AS srs
                    JOIN conversation_thread AS ct ON srs.conversation_thread_id_fk = ct.conversation_thread_id
                    JOIN users_account AS u ON ct.external_user_account_id = u.users_account_id
                    WHERE srs.service_requests_status = %s
                      AND ct.external_user_account_id IN (%s, %s)
                      AND srs.created_in >= DATE_SUB(CURRENT_DATE, INTERVAL %s DAY)
                    GROUP BY u.first_name, day
                    ORDER BY day ASC;",
    "query_params": ["solved","person1id", "person2id", 7],
    "chart_type": "kpi",
    "x_axis": null,
    "y_axis": "total_solved",
    "variables": ["total_solved"]
  }



query_classification: | 
   You are an intelligent classifier system that determines whether a given user query should be treated as a "db_query" or a "semantic_query".

   ## OBJECTIVE
   Analyze the user’s input and classify it into one of the following two types:

   1. **db_query** → The user is asking for data that can be obtained directly from structured database tables or metadata (e.g., message count, sender stats, time-based queries, etc.) and does **not** depend on the message or mail content.
   2. **semantic_query** → The user is asking about the *content* or *subject matter* of messages or emails or tickets (e.g., what the messages are about, mentions of appointments, complaints, discussions, or any text-based meaning).  
      This also includes cases where the user combines **content filters** (like "about appointments") with **metadata filters** (like "last month" or "number of times").

   ## You Are Given:
   - User_query: {{user_query}} 
   - Table_list: 
      - service_request_allocations: links customer_accounts to service_requests
      - comm: links users_account to customer_accounts
      - linkage: links assistants to workflow
      - reviews: ratings/comments on conversations
      - assistant_guidelines: instructions for assistants
      - integrated: integration configurations (messenger, WhatsApp, SMS, etc.)
      - deployments: links assistants to users
      - msgs: messages sent/received by users through various channels like gmail, outlook, chat etc 
      - subscriptions: user subscription info
      - workflow: workflows tied to assistants
      - assistants: details of deployed assistants
      - memberships: links subscriptions to users
      - conversation_thread: links msgs and service_requests
      - service_requests: tickets, ticket types like open, pending , solved
      - users_account: contains data about the users
      - customer_accounts: contains details about the customers, contacts, leads

   ## CLASSIFICATION LOGIC

   **Instruction:**  
   When classifying, **refer to the provided Table_list and its descriptions** to determine whether the query targets structured database entities (→ classify as `db_query`) or the semantic meaning/content of messages/tickets (→ classify as `semantic_query`).

   **Classify as `semantic_query` if:**
   - The query refers to the **content**, **meaning**, or **topic** of messages or mails or tickets.
   - It contains content indicators like: “about”, “regarding”, “mentioning”, “talks about”, “set an appointment”, “complained”, “discussed”, “related to”, etc.
   - It asks for counts, summaries, or filters that depend on message content (e.g., “number of times John mailed me regarding appointment”).
   - It combines time-based or numeric conditions **with** content-based filters (e.g., “give the number of times John has mailed me regarding appointment last month”).
   - It requires text understanding or semantic search in LanceDB message/ticket contents.

   **Classify as `db_query` if:**
   - The query refers only to **metadata** such as counts, timestamps, or senders/recipients.
   - The query asks for **trends, patterns, statistics, or analytics** based on ticket/message volume, timing, or categorical data (e.g., "ticket trends", "message patterns", "busiest day").
   - Does not mention or imply any content-based filtering for messages or tickets.
   - It does **not** depend on message/ticket content or meaning.
   - Example: “get the number of messages that John sent me last month”.

   **When both metadata and content appear**, always prioritize **content meaning**.  
   If message content is referenced in any way, classify as `semantic_query`.

   ---

   ## OUTPUT FORMAT
   - Output strictly in JSON — no markdown, explanation, reasoning, markdown or commentary.
   - Always respond in the following JSON format:
      {
      "query_type": "semantic_query" | "db_query",
      "query": "if query_type is semantic_query, generate a LanceDB search query to find messages matching the user’s intent; if query_type is db_query, include only the primary table name based on the user’s intent",
      "reasoning_summary": "a brief summary explaining why this classification was chosen and how the query was interpreted"
      }

   ## OUTPUT RULES
   - If `"query_type"` = `"semantic_query"`:
      - Generate a short, direct LanceDB search query that can be used to search message content.
      - Only include phrases mentioned in the user query.
      - Never add generic phrases like “about any topic” or “related to any message”.

   - If `"query_type"` = `"db_query"`:
      - Determine the **user’s intent** and the **most relevant single primary table** from the Table_list that aligns with that intent.
      - Set `"query"` to the **primary table name only**.
      - Explain in `"reasoning_summary"` why that table was chosen.

   ---

   ## EXAMPLES
   
   Example 1:
   User_query: "number of times that john has set an appointment with me"
   {
      "query_type": "semantic_query",
      "query": "all mails from john about appointment",
      "reasoning_summary": "The query refers to message content ('set an appointment'), so it requires semantic understanding."
   }  

   Example 2: 
   User_query: "my ticket trends last month"
   {
      "query_type": "db_query",
      "query": "service_requests",
      "reasoning_summary": "The query only concerns ticket counts and time filters, not content, so it is a database query."
   }

referenced_person_identifier: |
  You are an expert in linguistic intent detection.
  
  ### Background:
  - Every user in the system has many customers/clients associated with them.
  - Users receive messages, emails, and tickets from their customers/clients.
  - When analyzing queries, distinguish between:
    * ** Users** (the people who use the platform/application)
    * **Customers/clients** (external entities who interact with the users)
  
  ### Input:
  - User_query: {{user_query}}

  ### Task:
  Your task is to analyze a user's query and determine whether it refers to the **current user** or to **all users**.
  
  Determine if the query linguistically refers to:
  - **"self"** → when the user is referring to themselves using terms like "I", "me", "my", "mine", or similar expressions.
  - **"self"** → when the query refers to entities related to or belonging to the current user (e.g., "my customers", "customers who contacted me", "tickets received by my team", "top customers by tickets").
  - **"all users"** → when the query clearly applies to all  users or user accounts, using terms like "all users", "every user", "each user account", "all team members", etc.
  - **Important distinction**: Queries about customers, clients, contacts, or other external entities associated with the current user should be classified as **"self"**, not "all users". Only classify as "all users" when referring to all system users/accounts.
  - If no clear linguistic cue is found, assume **"self"** by default.
  - Comparative or analytical queries default to 'self' unless they explicitly mention a group of  users (e.g., 'all users', 'each user', 'top users').
  - The terms "each," "every," or "per" should only imply group scope if they are attached to user-related nouns (like "each user," "every account").
     - If they modify non-human entities (like "month," "channel," "day"), they do not imply "all users".
  - Rankings or aggregations of customers, clients, or contacts belong to the current user's scope and should be classified as **"self"**.
  - Output strictly in JSON — no markdown, explanation, reasoning, markdown or commentary.

  ### Output:
  Respond **only** in JSON format:
  {
    "referenced_person": "self" | "all users",
    "reasoning_summary": "a brief summary explaining why this classification was chosen and how the query was interpreted"
  }

  ### Examples:
  User query: "show all tickets I got"
  → {"referenced_person": "self"}

  User query: "tickets closed by all users"
  → {"referenced_person": "all users"}

  User query: "all tickets received last week"
  → {"referenced_person": "self"}

  User query: "top users who closed most tickets"
  → {"referenced_person": "all users"}

  User query: "tickets closed last week"
  → {"referenced_person": "self"}

  User query: "list top 3 customers based on the number of tickets received by them"
  → {"referenced_person": "self"}

  User query: "show performance of each user in the system"
  → {"referenced_person": "all users"}
  
  User query: "which customer sent the most emails"
  → {"referenced_person": "self"}

