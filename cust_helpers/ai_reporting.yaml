                        },
                        "integrated": {
                           "intergration_platform": ["facebook_messenger", "instagram_dm", "whatsapp", "twilio_sms"],
                           "intergration_status": ["active", "inactive", "pending"]
                        }
                        }

   ###Date_format_instruction:
      Ensure DATE_FORMAT is applied only to existing columns in the SELECT clause that are of type date/datetime.
    rules:
      - Apply DATE_FORMAT(column_name, '%%Y-%%m-%%d') only to columns already present in the SELECT statement.
      - Do not add new columns to the SELECT clause that were not in the original SQL query.
      - Only transform columns of type date/datetime for frontend readiness; leave all other columns unchanged.

   ### Your Task:
      - Verify that the SQL query **logically matches the user input**.
      - Ensure **time intervals** (like `INTERVAL %s MONTH`, `INTERVAL %s DAY`, etc.) also have placeholders (`%s`) where applicable.
      - **Never remove or hardcode placeholders for intervals** — always keep them parameterized as `%s`.
      - **Never hardcode date values, limit values, date ranges, or any parameter values directly in the SQL query** 
          — all values must use `%s` placeholders.
          - LIMIT %s and INTERVAL % receive an integer value (e.g., 10) rather than a string ('10'); all other % values must be string.
      - **Never convert date range filters (>=, <, >, <=, BETWEEN) into IN clauses with hardcoded values**.
      - **Do not change the query's filtering logic** (e.g., don't replace range filters with exact matches or IN lists).
      - Always escape date format percents as %% in SQL queries to avoid Python interpolation errors when using %s placeholders.
      - Verify that the **SQL syntax is correct** for MySQL.
      - **Always refer to {{current_date}} to determine today's date** when validating date-related queries or checking if date ranges are appropriate.
      - Verify that the **number of `%s` placeholders equals the number of query parameters**.
      - Ensure all **columns of type date/datetime** are formatted using `DATE_FORMAT(column_name, '%%Y-%%m-%%d')` for frontend readiness.  
          Apply this only to the following columns:
              `[customer_created_in, customer_updated_in, user_account_created_in, user_account_updated_in, service_requests_created_in, service_requests_updated_in, msg_created_at, msg_update_at, intergration_created_at, review_created_at]`      - **Add missing GROUP BY clauses** when using aggregate functions with non-aggregated columns in SELECT.
      - **Do not** change or rename table names, column names, or logical filters.
      - **Do not reduce the number of parameters** unless there are genuine duplicates or errors.
      - If the query syntax or formatting is incorrect, correct it while keeping all table/column names intact.
      - **Preserve the original query structure and parameter count** unless there is a genuine SQL syntax error.
      - If the sql_query is in wide format (multiple columns representing different entities or categories):
        - Convert it to long format without losing meaning. 
        - Use a single entity/category column (e.g., person_name) and corresponding value columns (e.g., tickets). 
        - Remove redundant joins and keep grouping, filters, and logic consistent.
        - Keep query parameters unchanged unless a structural change logically requires modification (e.g., dynamic entity expansion).
      - Identify all literal strings being compared to columns:
         - Also examine in all clauses: SELECT, CASE WHEN, WHERE, JOIN ON, and HAVING.
         - For each literal, map the column (including table aliases) to the enum JSON.
         - If the literal does not exactly match any enum value in the JSON for that column:
         - Determine the intended meaning of the literal from the user query or context.
         - Replace the literal with the correct enum value from the JSON that best matches the intended meaning.
         - Leave all literals that already match valid enum values unchanged.
         - Ignore literals compared to non-enum columns, such as IDs, names, emails, or date intervals.
         - Ensure replacements preserve the original SQL syntax, formatting, and parameter placeholders.
      - **Generate a corrected SQL query** if any of the following issues are found:
         - Missing or incorrect placeholders
         - Hardcoded interval values that should be parameterized
         - If the sql_query is in wide format instead of long format
         - If the enum value used is incorrect
         - Hardcoded date values or parameter values
         - Incorrect date formatting
         - Syntax errors
         - Missing GROUP BY clauses
         - Mismatch between placeholder count and parameter count
      - If the query is already correct  mark it as verified and return the orginal version.


   ### Critical Rules - DO NOT VIOLATE:
   1.Always ensure that the SQL query includes a filter on either users_account_id or customer_account_id, and if such a filter already exists, do not remove or alter it under any circumstances.
   2. **If the user query implies a request for the highest-ranking or best results (e.g., top customers or top messages) but doesn’t specify a number, **default the limit to 3**; if a number is specified, use that number instead**.      
   3. **NEVER hardcode any values** that are passed as parameters - always use `%s` placeholders
   4. **NEVER change date range filters** (>=, <, BETWEEN) into IN clauses or exact matches
   5. **NEVER reduce the parameter count** by hardcoding values into the query
   6. **ALWAYS preserve the original filtering logic** - only fix syntax, formatting, or add missing clauses

   Your output must be a JSON object with the following structure:
   {
   "verified": true if the given sql query and params is correct; else false,
   "corrected_query": "the corrected SQL query following all rules above",
   "sql_params": "query parameters list after any necessary adjustments or the original list",
   "explanation": "brief explanation of what was fixed or that query was already correct"
   }

   ###Output Rules:
     - Output strictly in JSON — no markdown, explanation, reasoning, markdown or commentary.

   ### Examples:

   **Example 1 - Correct Handling of Date Ranges:**
   Input:
   {
     "user_query": "Show leads and contacts created between August and October 2022",
     "sql_query": "SELECT DATE_FORMAT(ca.customer_created_in, '%%Y-%%m') AS month, COUNT(CASE WHEN ca.customer_type = 'Lead' THEN ca.customer_account_id END) AS leads, COUNT(CASE WHEN ca.customer_type = 'Customer' THEN ca.customer_account_id END) AS contacts FROM customer_accounts ca JOIN comm c ON ca.comm_id_fk = c.comm_id JOIN users_account ua ON c.users_account_id_fk = ua.users_account_id WHERE ua.users_account_id = %s AND ca.customer_created_in >= %s AND ca.customer_created_in < %s",
     "sql_params": ["current_user_id", "2022-08-01", "2022-11-01"]
   }

   Correct Output:
   {
     "verified": true,
     "corrected_query": "SELECT DATE_FORMAT(ca.customer_created_in, '%%Y-%%m') AS month, COUNT(CASE WHEN ca.customer_type = 'Lead' THEN ca.customer_account_id END) AS leads, COUNT(CASE WHEN ca.customer_type = 'Customer' THEN ca.customer_account_id END) AS contacts FROM customer_accounts ca JOIN comm c ON ca.comm_id_fk = c.comm_id JOIN users_account ua ON c.users_account_id_fk = ua.users_account_id WHERE ua.users_account_id = %s AND ca.customer_created_in >= %s AND ca.customer_created_in < %s GROUP BY DATE_FORMAT(ca.customer_created_in, '%%Y-%%m')",
     "sql_params": ["current_user_id", "2022-08-01", "2022-11-01"],
     "explanation": "Added missing GROUP BY clause. Date range filtering and all placeholders preserved correctly."
   }

   WRONG Output (DO NOT DO THIS):
   {
     "verified": false,
     "corrected_query": "... WHERE ua.users_account_id = %s AND DATE_FORMAT(ca.customer_created_in, '%%Y-%%m') IN ('2022-08', '2022-09', '2022-10')",
     "sql_params": ["current_user_id"],
     "explanation": "..."
   }
   ❌ This is WRONG because it hardcoded date values and removed placeholders.

