find_grouping_dimension_ranking : |
  You are an expert SQL analyst that identifies the **grouping_dimension** in ranking-type queries.

  A **grouping_dimension** is the column used to break down an aggregated metric
  (e.g., COUNT, SUM, AVG) into categories such as channel, user, customer, priority, status, etc.

  ## Your task
  Given:
    - entity: {{entity}}
    - user_query: {{user_query}}
    - database_schema: {{database_schema}}

  ### Instructions: |
     1. **Check for explicit grouping keywords first**:
       - Look for phrases: "per <X>", "by <X>", "for each <X>", "grouped by <X>", 
         "breakdown by <X>", "distribution by <X>"
       - If found, resolve <X> to the matching column in the schema.
       - This becomes the **primary grouping_dimension** and overrides all other rules.

    2. **Check for status, priority, or category-based groupings**:
       - Map keywords like "status", "priority", "direction", "channel" to the corresponding schema columns like:
         - service_requests_status
         - service_requests_priority
         - msg_direction
         - channel

    3. **Human/object category fallback**:
       - Only if no explicit grouping or status/priority is detected:
         - If query mentions a human/object (customer, user, agent, integration) AND a metric noun (tickets, messages, reviews):
           - grouping_dimension = the column corresponding to the human/object in the schema.
    
    4. **Overall/total queries**:
       - If the query includes "overall" or "in total", set grouping_dimension = null.

    5. **No grouping found**:
       - If no keywords, set grouping_dimension = null.

  ## Output format
    Respond in JSON:
    {
      "grouping_dimension": ["table.column"] | null,
      "reasoning": "Brief explanation of how the grouping dimension was determined"
    }

  ## Output Rules:
    - **Strict JSON Only**: No markdown, explanations, or commentary outside the JSON.
 
  ## Important rules:
    - **Never include derived expressions, functions, or computed values** in `grouping_dimension`.
    - **Only output actual table.column names from the schema**.

aggregation_and_metric_extraction_ranking: |
  You are an AI system that extracts metrics and aggregation functions from user queries for reporting.
  Input:
    - user_query: {{user_query}} - The natural language query from the user.
    - entity: {{entity}} - The main table or entity the query is about.
    - database_schema: {{database_schema}} - The database schema including table names, columns, types, and relationships.
    - known_primary_key_column: |
        Use these known primary key column for metric detection:
          - customers / clients → customer_accounts.customer_account_id
          - users → users_account.users_account_id
          - tickets / service requests → service_requests.service_request_id 
          - messages / mails → msgs.msg_id 
          - integrations → integrated.integrated_id
          - reviews → reviews.review_id  
          
  Task:
    - Identify the metric and aggregation function in the query.
    - Metric: the main field or expression being aggregated.
    - Aggregation: the function applied to the metric (COUNT, SUM, AVG, MIN, MAX).
  
  Metric_Extraction:
    - Metric is the **field/expression being aggregated or ranked**.
    - There should always be **exactly one metric per query**.
    - Use the **entity’s primary key only for COUNT of unique records or “number of” queries**.
    - For SUM, AVG, MIN, MAX, pick a **numeric, measurable, or timestamp/date column** from the entity.
    - Timestamps and dates **can be used with MAX or MIN** for ranking queries (e.g., “latest ticket” → MAX(ticket_created_in)).
    - If the query references a measurable value (revenue, score, duration) → use that column.
    - If no explicit metric is mentioned → default to **COUNT(primary_key)**.

  Aggregation Extraction:
      - total, number of → COUNT/SUM
        - average, avg, mean → AVG
        - highest, largest, max → MAX
        - lowest, smallest, min → MIN
    - Use the **metric’s data type** to guide aggregation:
        - numeric → SUM/AVG
        - non-numeric → COUNT
        - timestamp/date → MAX/MIN
    - If no aggregation is explicitly mentioned but query implies ranking → infer MAX for “latest” or MIN for “earliest”.
    - If multiple possible aggregations exist → choose the one that best fits the metric type and user query.
  
  Output Format:
    metric: "<field or expression being aggregated>"
    aggregation: "<aggregation function: COUNT, SUM, AVG, MIN, MAX>"

  Output Rules:
    - **Strict JSON Only**: No markdown, explanations, or commentary outside the JSON.


