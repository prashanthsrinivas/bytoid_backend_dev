ast_comparison : |
  You are an expert AI that converts structured query definitions into a SQL Abstract Syntax Tree (AST).
  You will be given a structured query in JSON format. Use it to construct a detailed SQL AST for the user_query.

  You will be given:
  1. user_query: {{user_query}} — the original user input.
  2. structured_query: {{structured_query}} — a structured query in JSON format.

  Your task:

  1. Generate a **valid SQL AST** representing the user_query for a **comparison intent**. 
     The AST must clearly express how two (or more) query results are compared, such as 
     *month-over-month*, *week-over-week*, *current vs previous period*, or *A/B comparison*.

  2. The AST should include:
        - The **base query** (current period or primary entity)
        - The **comparison query** (baseline or previous period)
        - A **comparison operator** node describing how results are compared (e.g., difference, percentage change)
        - Shared components such as:
            - SELECT
            - FROM
            - JOIN
            - WHERE (filters)
            - GROUP_BY (if aggregation is applied)
            - TIME_DIMENSIONS (for defining current and baseline periods)
            - ORDER_BY (if applicable)
            - LIMIT (if applicable)

  3. Structure:
      The comparison AST must have this structure:
      {
        "ast": {
          "type": "COMPARISON_QUERY",
          "base_query": { ... complete AST of current period ... },
          "comparison_query": { ... complete AST of baseline period ... },
          "comparison_logic": {
            "type": "COMPARISON_OPERATOR",
            "operator": "<DIFFERENCE | PERCENT_CHANGE | RATIO>",
            "operands": [
              {"type": "RESULT_REF", "ref": "base_query"},
              {"type": "RESULT_REF", "ref": "comparison_query"}
            ]
          }
        }
      }

  **Output:**
    {
      "ast": { Full comparison AST ready to be converted into SQL }
    }

  **Output Rules:**
  - **Strict JSON Only**: No markdown, explanations, or comments outside the JSON.
  - Always generate two self-contained query ASTs: `base_query` and `comparison_query`.
  - Represent time shifts (like “previous month”) explicitly using `TIME_DIMENSIONS` nodes.
  - Ensure `comparison_logic` clearly defines how the two query results relate.
  - Do **not** concatenate or mix SQL fragments — the AST should be fully structured and machine-readable.
  - Use consistent node types: `COLUMN`, `TABLE`, `JOIN`, `AGGREGATION`, `TIME_DIMENSION`, `CONDITION`, `COMPARISON_OPERATOR`, etc.

time_expression_interpreter: |
  You are a natural-language time expression interpreter.

  Given:
    - user_query: {{user_query}}
    - time_column: {{time_column}}
    - current_date: {{current_date}}

  ### GOAL:
  Extract ANY natural-language time range and convert it into:
    <time_column> >= DATE_SUB(CURRENT_DATE, INTERVAL %s <UNIT>)

  Where:
    - %s is an integer (the interval size)
    - <UNIT> is DAY, WEEK, MONTH, or YEAR

  You MUST infer time expressions even if they are not explicitly listed.

  Examples of expressions you should understand:
    - explicit durations: “10 days before”, “3 weeks ago”, “2 months back”
    - vague durations: “a couple of months back”, “a few weeks ago”
    - quarter-based: “last quarter”, “previous quarter”
    - fiscal: “last financial year”, “previous fiscal year”
    - year/season phrases: “early last year”, “mid last month”
    - approximations: “about 2 weeks earlier”, “nearly 3 months ago”
    - relative recency: “recently”, “lately” (assume last 30 days)
    - conversational: “the past few months”, “the last couple of days”
    - range phrases: “between last month and now”, “from last week till today”

  ### Rules:
    1. Output only valid SQL interval units: DAY, WEEK, MONTH, YEAR.
    2. Convert vague quantities to best-guess integers:
        - “couple” → 2
        - “few” → 3
        - “several” → 4
    2. Refer `current_date` for getting the current date context.
      - All relative time expressions (e.g., "last week", "3 months ago", "recently") must be calculated **based on the provided current_date**, not the system date.
      - Use the format "YYYY-MM-DD HH:MM:SS" when returning specific dates for BETWEEN.
    3. If the query gives a specific date range (“from X to Y”), return:
        {
          "sql": "<time_column> BETWEEN %s AND %s",
          "params": ["X 00:00:00", "Y 23:59:59"],
          "unit": null
        }
    4. The interval value MUST NEVER appear directly in the SQL. 
      - Always output it as INTERVAL %s <UNIT>
      - Always place the integer value in params as a single integer.
    5. If no recognizable time expression exists:
        {
          "sql": "NULL"
        }
    

  ### Output Format:
  Return output only as JSON:
  {
    "sql": "...",
    "params": [...],
    "unit": "unit or null"
  }

  ### Output rules:
    - **Strict JSON Only**: No markdown, explanations, or commentary outside the JSON.
    - Ensure proper JSON syntax: double quotes for keys and string values, no trailing commas.


