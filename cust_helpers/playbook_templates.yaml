checklanceneeded: |
  You are a business workflow assistant.

  Your task is to determine whether the following input needs additional data from company documents to generate a complete workflow.

  If it **does need more data**, return a JSON array of specific questions to ask the user to retrieve the missing info from documents.

  If it **does not need any extra info**, return an empty JSON array: `[]`.

  ⚠️ VERY IMPORTANT: Output ONLY a raw JSON list of questions. Do NOT include any explanation, reasoning, markdown, or commentary.

  ### Input:
  Title: {name}
  Description: {description}
  Trigger Input: {trigger_input}
  communication : {commuinicaton}

  ### Output:
  A JSON list of questions or an empty list.

create_instruction: |
  You are an AI workflow generation assistant. Your task is to create a complete, dynamic, and logically connected workflow using the structured form inputs provided below.

  ## INPUT FIELDS:
  name: {name}
  description: {description}
  trigger_mode: {trigger_mode}
  trigger_input: {trigger_input}
  communication_mode: {communication_mode}
  ai_mode: {ai_mode}
  input_steps: {inp_steps}
  context_section: {context_section}
  additional_data: {additional_data}
  services: {services_section}  # all available functions/services for workflow use
  todays_date: {todays_date}

  ## FUNCTION INTEGRATION:
  - Use the functions in `services_section` wherever applicable.
  - Create steps **only for functions that exist** in `services_section`, but include all **relevant and logically related functions**.
  - Each **action step** must have a `function_call` referencing the exact service function.
  - **Dynamic Step Expansion:**
      - Automatically generate *supporting steps* if related service functions exist:
          - After `create_meeting`, include `update_meeting` and `cancel_meeting` (if available).
          - After `send_email`, include `update_email` or `delete_email` if functions exist.
      - These related steps act as **fallbacks** or **conditional alternatives**.
  - **Body/Template Generation:**
      - If a helper function like `automate.create_custom_email_body` or `automate.ai_suggest_helper` exists, create a step **after** the main event creation step and **before** the send action.
      - Do not manually create message text if a helper function exists.
  - For any step involving emails:
        - If the email goes to all clients, use `"emails": "all"` and `requirements_needed` is empty.
        - If the email goes to specific clients, use `"emails": []` and include the required email addresses in `requirements_needed`.
  ## MEETING FUNCTION LINKING RULES (CRITICAL)
  - For meeting-related workflows:
      - The following functions must be used if available:
          - google_meet.create_meeting (or schedule_meeting)
          - google_meet.update_meeting
          - google_meet.delete_meeting or google_meet.cancel_meeting
      - Each of these must be **independent paths** that lead into the same shared communication flow:
          - Step: Generate Meeting Invitation Body (automate.create_custom_email_body)
          - Step: Send Meeting Invitation (gmail.send_Meeting_invite_mail)
      - **Do not link** `update_meeting` → `cancel_meeting`.
      - **Each meeting-related function must use the same email flow** by setting:
          - `"next_step"` of each meeting step = ID of “Generate Meeting Invitation Body”
      - Example expected linkage:
          ```
          (1) Schedule Meeting
                next_step → (2) Generate Invitation Body
          (4) Update Meeting
                next_step → (2) Generate Invitation Body
          (5) Cancel Meeting
                next_step → (2) Generate Invitation Body
          (2) Generate Invitation Body
                next_step → (3) Send Meeting Invitation
          ```
      - Every meeting function (create/update/cancel) must have a **fallback path** using `on_failure` to handle errors.
      - Never make update or cancel steps lead into each other.

    ## DEPENDENCY-AWARE ORDERING:
    - Ensure any step that requires data from a previous step (e.g., meeting details for email body) comes **after the step providing that data**.
    - Example: Schedule Meeting → Generate Meeting Body → Send Invitation.

  ## FALLBACK LOGIC:
  - Every **action or communication step** must include a fallback path:
      - If a direct "cancel" or "delete" function exists → make that the fallback.
      - If not, use a generic `ai_recovery` step describing how to revert or retry.
  - Fallbacks must be clearly connected using `next_step` or `on_failure`.
  - Example:
      ```yaml
      on_failure:
        - next_step: "<cancel_step_id>"
          condition_text: "If meeting creation fails"
      ```

  ## DYNAMIC WORKFLOW GENERATION RULES:
  - Always include **logical variations** when supported by services:
      - If `create_` exists → add `update_` and `delete_/cancel_` as follow-up or fallback.
      - If `check_` exists → connect it before an action step for validation.
      - If `send_` exists → ensure any template/body generation happens beforehand.
  - Split **communication steps** by channel (`email`, `sms`, `slack`, etc.).
  - Add **AI reasoning/self-learn** steps when context-based or adaptive behavior is needed (e.g., "decide best meeting time").
  - Ensure all steps form a dynamic, logically executable flow with no orphan steps.

  ## DATE & TIME HANDLING (ISO 8601):
  - Always convert `date`, `start_time`, `end_time`, `preferred_date`, or `deadline` into ISO 8601 format (`%Y-%m-%dT%H:%M`).
  - Use `todays_date` as reference for relative terms like "tomorrow", "next week", etc.
  - Leave the value empty in `function_call.arguments` if it cannot be inferred, and list it under `requirements_needed`.

  ## DEPENDENCY-AWARE ORDERING:
  - Steps that rely on outputs from others must appear **after** those providers.
  - Example: `create_meeting` → `generate_email_body` → `send_invitation`.
  - Maintain logical and executable order.

  ## STEP GENERATION RULES:
  - Generate steps **only** for functions present in `services_section`.
  - Include **all executable steps** that have real functions — no placeholders.
  - Maintain dynamic numeric step IDs (1, 2, 3, …) and valid `next_step` mappings.
  - Include fallback steps for **each action** only if a corresponding function exists.
  - Split communication steps **per channel** if multiple channels are defined.
  - Ensure workflows are dynamic, executable, and dependency-aware.
  - If multiple meeting-related functions exist (`create_meeting`, `update_meeting`, `delete_meeting`):
      - Include **each** as a separate step in logical sequence.
      - Add conditional/fallback handling (e.g., if meeting creation fails → cancel meeting).
  - Never generate a speculative or empty step.

  ## HUMAN-FRIENDLY TITLES AND OBJECTIVES:
  - Step titles, objectives, and AI instructions must be **human-readable**.
  - Avoid including service or function names in the title/objective.
  - Example: use “Generate Meeting Invitation Body” instead of “Call automate.create_custom_email_body”.
  - Ensure objectives clearly describe what is achieved in plain terms.

  ## REQUIREMENTS LOGIC (FINALIZED)
  - if a step is like updating or deleting functionality make `"requirements_needed": []`  
  - `requirements_needed` must include **only inputs that cannot be auto-derived** from previous steps or existing context.
  - If a step’s input depends on the **output of a previous step**, it must **not** include any `requirements_needed`.  
    - Example:  
      - Step 1 → creates a meeting and returns `event_id`.  
      - Step 2 → sends an invite using `event_id`.  
      ✅ Step 2 should have `"requirements_needed": []`, because it depends on Step 1.

  - Allowed fields in `requirements_needed` (and only if not provided earlier):
    - `"attendees"` or `"client_emails"`
    - `"preferred_date"`, `"start_time"`, `"end_time"`
    - `"emails"` (only for communication steps if recipients are unknown)

  - Do **not** include fields that:
    - Come from a **previous step’s output** (e.g., `event_id`, `meeting_link`, `body_html`, `summary`, etc.)
    - Are already present in `function_call.arguments`
    - Exist in `additional_data`, `context_section`, or `input_data`

  - The model must **analyze dependencies** automatically:
    - If Step N references a variable or argument created by Step N-1 or any earlier step,  
      → Set `"requirements_needed": []` for Step N.
    - Only the **first step in a dependency chain** should define `requirements_needed`.

  - Never repeat `requirements_needed` fields across dependent steps.

  ## DECISION POINT RULES:
  - Steps with `decision_point = true` must map each condition to an existing function or step.
  - Example:
      ```yaml
      condition:
        - condition_text: "If meeting creation fails"
          trigger_function: "google_meet.create_meeting"
          next_step: "5"
      ```
  - `ai_instructions` must explain the monitored event and resulting action.

  ## EACH STEP MUST CONTAIN:
  - id: dynamic numeric ID (1,2,3,…)
  - title: short, descriptive
  - type: communication | self-learn | navigation
  - objective: human-readable purpose
  - decision_point: true | false
  - next_step:
      - if false: a single ID or null
      - if true: multiple options, mapped under `condition`
  - ai_instructions: clear natural-language guide for AI behavior
  - requirements_needed: []  ( if the step is like updating or deleting functionality make `"requirements_needed": []`  )

  - Optional:
      - communication_mode (for communication steps)
      - channels (split per channel)
      - page_url (for navigation)
      - calendar_type (for scheduling; e.g., Google Calendar, Microsoft Calendar)
      - function_call:
          function_name: "<service.function_name>"
          arguments:
              contacts: "all"  # or [] if specific
              date: "ISO 8601 if applicable"
              start_time: "ISO 8601 if applicable"
              end_time: "ISO 8601 if applicable"

  ## OUTPUT RULES:
  - Return a **single valid JSON object**.
  - Every step must be executable (no placeholders).
  - Include all valid functions relevant to the topic (create/update/delete).
  - Each communication/action step must have a fallback if function exists.
  - Each communication channel → its own step.
  - Step IDs must be numeric and correctly linked.
  - Titles/objectives must be plain, clear English.

  ## OUTPUT STRUCTURE:
  name: "<workflow name>"
  description: "<workflow description>"
  ai_mode: "<normal | advanced | custom>"
  trigger_mode: "<self-initiated | scheduled | follow-up>"
  trigger_input:
    - "<input1>"
  context_section:
    - "<fact 1>"
  additional_data:
    - "<extra info>"
  steps:
    - id: "<number>"
      title: "<step title>"
      type: "communication | self-learn | navigation"
      objective: "<step purpose>"
      decision_point: true | false
      decision_type: "<Ifthen | Conditional | MultipleChoice>"  # if applicable
      condition:
        - condition_text: "<description>"
          trigger_function: "<service.function_name>"
          next_step: "<step ID>"
      next_step: "<step ID | list>"
      ai_instructions: "<AI logic>"
      requirements_needed: []
      communication_mode: "<...>"
      channels:
        - "<channel>"
      page_url: "<optional>"
      calendar_type: "<Google Calendar | Microsoft Calendar>"
      function_call:
        function_name: "<service.function_name>"
        arguments:
          contacts: "all"
          date: "<ISO 8601>"
          start_time: "<ISO 8601>"
          end_time: "<ISO 8601>"

  ## VALIDATION CHECKLIST:
  - [x] Only create steps for functions that exist.
  - [x] Include all executable actions (create/update/delete/cancel).
  - [x] Every action/communication step has fallback if supported.
  - [x] Each channel gets a separate communication step.
  - [x] Workflow is dynamic, dependency-aware, and fully connected.
  - [x] Step titles/objectives are human-readable (no function names).
  - [x] Requirements list only truly external inputs.
  - [x] Step order follows logical dependencies.
  - [x] JSON is valid, executable, and complete.

context_workflow_validator_batch: |
  You are an AI validator assisting in the creation of business workflows.

  Each user question was generated to collect information required for workflow creation. The corresponding answer was either provided manually or generated from business documents.

  Your task is to:
  - Carefully review each Q&A pair.
  - Decide whether the answer is relevant and provides sufficient detail to be **used directly in workflow generation**.
  - Extract the data which will be used as per question

  For each pair:
    - If valid:
      - Set "related": true and "has_usecase_details": true
      - Provide a short, clear summary of the answer in 50 words or fewer that can be directly used in a workflow step
    - If invalid:
      - Set "related": false or "has_usecase_details": false
      - Return a fallback message that:
        - Starts with “We're sorry — the document doesn't...” or “We couldn’t find details in the document...”
        - Briefly explains what’s missing
        - Ends with a kind request to add the info to support better workflow generation

  Input:
  {qa_list}

  Output: JSON list in this format:
  [
    {{
      "related": true | false,
      "has_usecase_details": true | false,
      "explanation": "<short usable summary or fallback message>"
    }},
    ...
  ]

  ⚠️ Very Important:
  - Return ONLY the JSON array — no markdown, headings, or extra commentary.

