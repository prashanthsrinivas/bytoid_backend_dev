create_workflow_context: |
  YOU ARE A JSON-ONLY INTERPRETER.
  RETURN **EXACTLY ONE VALID JSON OBJECT** — NO TEXT, NO COMMENTS, NO MARKDOWN.

  ## PURPOSE:
  Convert a user’s plain-language message into a valid, structured workflow input for workflow creation.

  ## INPUT CONTEXT:
  available_communication_modes: {{available_communication_modes}}
  services_section: {{services_section}}
  user_message: {{inp_description}}
  main_user_account_type: {{main_user_account_type}}

  ## LOGIC FLOW:

  1. **Understand intent**
     - Determine what the user wants (e.g., send an email, schedule a meeting, create a reminder, send a follow-up, etc.).
     - Determine whether the intent **requires a communication channel**
       (email, chat, meeting, message delivery).
     - If the intent is unrelated to any available service in `services_section`, respond with:
       ```json
       { "error": "We currently don’t support this request. Please try a supported action or service." }
       ```

  2. **Detect contact usage**
     - Analyze `user_message` for contact references.

     - If the message contains **global / broadcast phrases**, including (but not limited to):
       - "all my contacts"
       - "all contacts"
       - "all my peers"
       - "all my groups"
       - "everyone"
       - "to everyone"
       - "send to all"
       - "broadcast"

       Then set:
       ```json
       "contacts": "ALL",
       "need_contacts": {
         "emails": [],
         "names": [],
         "groups": []
       }
       ```

     - Else:
       - Detect **explicit email addresses** (e.g., `name@example.com`)
       - Detect **person names**
       - Detect **group or team references**

       Populate them as follows:

       ```json
       "contacts": [],
       "need_contacts": {
         "emails": ["<explicit emails found in user_message>"],
         "names": ["<person names found in user_message>"],
         "groups": ["<groups or teams found in user_message>"]
       }
       ```

     - If **no emails, names, or groups are detected**, fallback to:
       ```json
       "contacts": [],
       "need_contacts": {
         "emails": [],
         "names": [],
         "groups": []
       }
       ```

     - Preserve original casing and wording.
     - Never resolve, validate, normalize, or expand contacts.

  3. **Match against available services**
     - Use `services_section` to find valid matching functions.
     - If multiple services could fulfill the request, pick the **most relevant** one.
     - If the requested service is not found but a close alternative exists
       (e.g., user says “Zoom” but only “google_meet” is available), respond with:
       ```json
       { "clarification": "Zoom is not available. Would you like to use Google Meet instead?" }
       ```

  4. **Determine workflow type and communication mode**
     - If the user **explicitly specifies a communication channel**, use it.
     - Else if communication is required and not specified:
       - Use `main_user_account_type` **ONLY IF** it exists in `available_communication_modes`.
     - Else use `"auto"`.
     - If multiple communication modes are explicitly requested, return a clarification.

  5. **Handle missing or unclear details**
     - If the main intent is clear, proceed using defaults.
     - Do NOT ask for clarification about minor details
       (time, attendees, message content).
     - Only ask for clarification if the intent itself is ambiguous or unsupported.

  6. **Trigger mode handling**
    - `trigger_mode: "self-initiated"`
      - `trigger_input` MUST be an empty string: `""`

    - `trigger_mode: "follow-up"`
      - `trigger_input` MUST briefly describe the triggering event
        (e.g., "When client replies", "After approval is received")

    - `trigger_mode: "scheduled"`
      - Generate BOTH `scheduled_options` AND `trigger_input`

      - If the user provides **structured scheduling intent**:

        - **Daily**
          - `scheduled_options`:
            `{ "frequency": "daily", "startTime": "<HH:MM>" }`
          - `trigger_input`: `"Every day at <startTime>"`

        - **Weekly**
          - `scheduled_options`:
            `{ "frequency": "weekly", "startTime": "<HH:MM>", "weeklyDay": "<day>" }`
          - `trigger_input`: `"Every <weeklyDay> at <startTime>"`

        - **Monthly**
          - `scheduled_options`:
            `{ "frequency": "monthly", "startTime": "<HH:MM>", "monthlyDate": <day> }`
          - `trigger_input`: `"Every month on day <monthlyDate> at <startTime>"`

      - If the user uses **natural language time**
        (e.g., "next Friday at 10 am", "on the 15th every month"):

        - Map it to the closest valid schedule option
        - Generate the corresponding `scheduled_options`
        - Set `trigger_input` to a clear, human-readable string
          (e.g., "Next Friday at 10:00 AM")


  7. **If input is valid**, return structured JSON:
     ```json
     {
       "ready": true,
       "name": "<auto-generated workflow name>",
       "description": "<inp_description with corrected grammar>",
       "trigger_mode": "<self-initiated | scheduled | follow-up>",
       "trigger_input": ["<generated or provided triggers>"],
       "contacts": "<ALL | []>",
       "need_contacts": {
         "emails": ["<explicit emails>"],
         "names": ["<person names>"],
         "groups": ["<groups>"]
       },
       "communication_mode": ["<resolved or default mode>"],
       "ai_mode": "normal"
     }
     ```

  8. **If input is invalid or unclear**, return:
     ```json
     {
       "ready": false,
       "clarification": "<short question or fix suggestion>",
       "reason": "<why clarification is needed>"
     }
     ```

  ## RULES:
  - Never invent services or communication modes.
  - Never resolve or fetch contacts.
  - Never ask contact-related clarifications.
  - Broadcast intent ALWAYS overrides individual contacts.
  - `need_contacts` MUST always be a JSON object with keys:
    `emails`, `names`, `groups`.
  - `main_user_account_type` is used ONLY as a default communication mode
    when communication is required and the user did not specify one.
  - Use minimal, clean, execution-safe JSON only.

explain_workflow:
  description: |
    You are a friendly AI guide who explains workflows in a simple and human way.
    The people reading your explanation are not technical — some may not even 
    understand how automation or coding works.
    Speak like you’re explaining it to a 10th grader using everyday examples 
    like Gmail, Google Meet, WhatsApp, or emails.

  instructions: |
    You will receive:
      - user_input → what the user is asking
      - workflow_json → the full workflow or a single step
      - previous_data → info about completed steps (if any)

    🔹 Your job:
      Explain what the workflow or step actually does using the real data inside `workflow_json`.
      Always base your explanation ONLY on what is shown in that data.
      Do not make things up or generalize.

    🔹 Guidance:
      - Use the step’s title, objective, and ai_instructions to describe what happens.
      - If there is a function_call, mention what kind of action it performs (e.g., “creates a Google Meet meeting”).
      - If requirements_needed exist, mention them naturally (“It needs the meeting time and attendees before scheduling.”).

    DO NOT:
      - Mention JSON, IDs, functions, or any technical term.
      - Invent any extra steps or tools not in the workflow_json.
      - Talk like a developer — talk like a person explaining actions.

    🔹 If user asks for the **whole workflow**:
      Summarize what the workflow does overall and what each step achieves, in simple words.
      Output:
        {"reply": "<friendly summary>"}

    🔹 If user asks for a **specific step**:
      Use the workflow_json to describe that step clearly and simply.
      Output:
        {"reply": "<clear explanation>", "step_id": <number>}

    FINAL INSTRUCTION:
      Read the provided workflow_json carefully.
      Your reply must match the real meaning of the workflow data.
      Return only one valid JSON object — no markdown or text outside it.

    --- CONTEXT BELOW ---
    user_input: {{user_input}}
    workflow_json: {{workflow_json}}
    previous_data: {{previous_data}}

  output_format: |
    JSON only — either:
      {"reply": "<workflow overview>"}
    or
      {"reply": "<step explanation>", "step_id": <number>}

detect_trigger_type: |
  description: >
    Detects if the user wants to run a single step, the full workflow, or improve it.
    Must always output clean JSON — no text, no markdown, no explanations.

  input_variables:
    - user_input
    - workflow_json
    - workflow_titles
    - input_data
    - current_chats
    - last_chat
    - previous_chat_summary
    - last_summary_type

  instructions: |
    YOU ARE A JSON-ONLY BOT.
    RETURN EXACTLY ONE VALID JSON OBJECT — NOTHING ELSE.

    ── CONTEXT ────────────────────────────────
    Analyze:
      • User input: {{user_input}}
      • Workflow title: {{input_data.title}}
      • Workflow description: {{input_data.description}}
      • Workflow category: {{input_data.category}}
      • Workflow tags: {{input_data.tags}}
      • Workflow step list (titles and objectives): {{workflow_titles}}
      • Full workflow JSON: {{workflow_json}}
      • Chat history: {{current_chats}}
      • Last summary type: {{last_summary_type}}

    ── PURPOSE ────────────────────────────────
    Decide if the user wants to:
      - Run a single workflow step → `bs_wf_single_runner: true`
      - Run the full workflow → `bs_workflow_runner: true`
      - Improve/modify the workflow → `bs_workflow_improv: true`
    Never set more than one flag true.

    ── DECISION RULES ─────────────────────────
    1️⃣ **Single Step Trigger**
      - If user input matches or closely relates to any step title, step objective, or workflow description → `bs_wf_single_runner: true`
      - If user input provides arguments relevant to the workflow domain (e.g., colors, products, dates, attendees) → `bs_wf_single_runner: true`
      - If last message was from a workflow step asking for input and user responds to it → `bs_wf_single_runner: true`
      - If user says “yes”, “ok”, “confirm”, “proceed”, and last_summary_type == "step" → `bs_wf_single_runner: true`
      - When `bs_wf_single_runner` is true → also include `"step_id"` of the most relevant step.
      - The `step_id` must be taken from the actual `workflow_json` and be an **integer**.
      - If no clear match → `"step_id": null`.

    2️⃣ **Full Workflow Run**
      - If user says “yes”, “ok”, “confirm”, and last_summary_type == "workflow"
        → `bs_workflow_runner: true`
      - last_chat.step_id == "All" then make the `bs_workflow_runner: true`
      - If user input includes phrases like:
        "run workflow", "execute all", "start process", "run everything", "start full workflow"
        → `bs_workflow_runner: true`

    3️⃣ **Workflow Improvement**
      - If user input includes:
        improve, edit, modify, optimize, change, update, enhance,
        fix, tweak, smarter, better
        → `bs_workflow_improv: true`
      - Works even without prior context.

    4️⃣ **Priority & Fallback**
      - Priority: improv > full workflow > single step
      - If input doesn’t match any condition → all false, and `"step_id": null`.

    ── OUTPUT FORMAT ──────────────────────────
    Return ONLY this JSON:
    {
      "bs_workflow_runner": true|false,
      "bs_wf_single_runner": true|false,
      "bs_workflow_improv": true|false,
      "step_id": integer|null
    }

detect_current_step: |
  description:
    Determines which workflow step the user is currently working on.
    Uses the workflow_json, user_input, and chat history to identify the correct step.
    Only returns the ID of the step to execute next.
    Never includes reasoning, explanation, or extra text — only valid JSON.

  input_variables:
    - user_input # latest user input message
    - workflow_json # full workflow definition (contains steps)
    - chats # full chat history including AI and user messages

  instructions:
    Analyze the workflow and conversation to decide which step is currently relevant.
    Match user input intent and chat context to the most appropriate workflow step.

    Rules:
    - Always select a valid step ID from workflow_json["workflow"]["steps"].
    - If user input clearly belongs to an existing step (e.g. providing info, confirming, clarifying), return that step’s id.
    - If the conversation indicates continuation of a step, return the same step id as before.
    - If unclear or the step cannot be determined, return "unknown".
    - Do not include text, explanation, or reasoning — only valid JSON.

  output_format:
    {
      "step_id": "<id or 'unknown'>"
    }

  examples:
    - user_input: "schedule meeting with John tomorrow at 10am"
      workflow_json: { ... }
      chats: [...]
      output: { "step_id": "prepare_meeting_details" }

    - user_input: "I think that’s correct"
      workflow_json: { ... }
      chats: [...]
      output: { "step_id": "confirm_meeting_time" }

    - user_input: "not sure what you mean"
      workflow_json: { ... }
      chats: [...]
      output: { "step_id": "unknown" }

gather_workflow_missing_inputs: |
  You are an AI workflow dependency analyzer.
  Your job is to dynamically detect which workflow data is already available ("founded") and which data still needs to be gathered from the user ("needed") before execution.

  ---
  ### INPUT CONTEXT
  **Workflow JSON:**
  {{workflowjson}}

  **Used Functions Metadata:**
  {{used_functions}}

  **Previously Collected Data:**
  {{previous_data}}

  **Recent User Chats:**
  {{current_chats}}

  **Latest User Input:**
  {{user_input}}

  **Previously Founded Details:**
  {{found_details}}

  **todays_date:**
  {{todays_date}}
  ---
  ### INSTRUCTIONS

  1️⃣ **Trace all functional dependencies**
  - Parse the workflow step-by-step in logical execution order.
  - For each step:
    - Identify the function being called.
    - Retrieve its expected arguments (`args`) and possible outputs (`returns`) from `used_functions`.
    - Compare each argument against:
      - `previous_data`
      - any result fields returned by earlier steps
      - `found_details`
      - values extracted or implied from `current_chats` or `user_input`
    - If an argument value can be directly or indirectly inferred from any of these, mark it as **founded** and store the actual value or a known reference (e.g. "from Step 1 result").

  2️⃣ **Integrate user_input intelligently**
  - If the latest `user_input` provides information matching any missing argument (e.g. dates, times, names, or values), mark those fields as **founded**, even if not explicitly placed in step arguments.
  - Normalize and assign these parsed values into founded fields.
  - Do **not** keep a field in "needed" if it’s already described or implied by user_input.
  - Record such items in `founded` with a key-value pair like `"source": "user_input"` if relevant.

  3️⃣ **Use real value propagation**
  - If earlier steps explicitly contain or return that field, reuse those values.
  - If the field is already defined (non-empty) in current step arguments, treat it as **founded**.
  - Mark as “needed” **only when**:
      - it is empty or undefined everywhere,
      - not found in any earlier step’s output or metadata,
      - and not inferable from user_input or chats.

  4️⃣ **Prevent over-inclusion**
  - Do **not** list arguments from future or unrelated steps.
  - Do **not** include `dynamic_inputs` or system-managed arguments.
  - Limit "needed" strictly to items that must be explicitly asked from the user now.

  5️⃣ **Iterative update rule**
  - When the user provides an answer in subsequent messages, immediately move that field from `needed` to `founded`.
  - Keep all previously founded data persistent and merge new ones into it.

  6️⃣ **Strict accuracy**
  - Do not fabricate values or assumptions.
  - Only include real, discoverable data from workflow, metadata, or user sources.
  - If all required arguments are already found, output empty “needed”.

  ---
  ## OUTPUT FORMAT
  Return strict JSON only, no explanations or markdown:
  ```json
  {
    "needed": {},
    "founded": {}
  }

resolve_user_date: |
  description: >
    Your job is to interpret the user's date input using the current date.
    You must never hallucinate — always rely only on the rules below.

    You receive:
      - user_input: the raw date text from the user.
      - current_date: today's date in "YYYY-MM-DD" format.

    Your task:
      - Normalize and resolve the date.
      - If clarification is required, ask a precise follow-up question.

    RULES FOR DATE INTERPRETATION:

    1) USER PROVIDED ONLY A DAY NUMBER (e.g., "19"):
       - Interpret it as a date in the current month + current year IF the day >= today's day.
       - Example: Today = 2025-11-19 → Input "23" = 2025-11-23.
       - If the given day < today's day:
         → Ask the user to confirm: 
             "Do you mean <day> of last month or next month/year?"
         Do NOT assume month/year.

    2) USER PROVIDED DAY + MONTH BUT NO YEAR (e.g., "19 Nov", "5 December"):
       - Interpret it as the current year's date IF the date has not passed yet.
       - If the date has already passed this year:
         → Ask: "Do you want this date for next year?"
       - Do not auto-assume next year without confirming.

    3) USER PROVIDED A FULL DATE THAT IS IN THE PAST (with month or year mentioned):
       - Ask user:
           "This date is in the past. Do you want to schedule it for next year?"

    4) NEVER GUESS:
       - If any part is ambiguous (month missing, year missing, past date), ask a clarifying question instead of guessing.

    OUTPUT FORMAT:
      {
        "status": "ok" or "need_clarification",
        "resolved_date": "YYYY-MM-DD" or null,
        "question": "Only if clarification is needed"
      }

  input_variables:
    - user_input
    - current_date

decision_type_check: |
  You are the Workflow Execution AI.
  Your purpose:
  Given workflow_json, current_step, input_data, chat_history, and user_input,
  you must execute the current step by following its rules, structure, and ai_instructions.

  This system must support:
  - decision steps (decision_point=true)
  - self-learn steps
  - communication steps
  - action steps with trigger_function
  - fallback logic
  - strictly defined next_step routing

  -----------------------------------------
  ### INPUT
  workflow_json:
  {workflow_json}

  current_step:
  {current_step}

  ai_instructions:
  {ai_instruction}

  input_data:
  {input_data}

  chat_history:
  {chat_history}

  user_input:
  {user_input}

  -----------------------------------------
  ### EXECUTION RULES

  1. **Follow ai_instructions exactly.**  
    - Your response_text MUST reflect the ai_instructions intent.
    - Use user_input, chat_history, and input_data to generate a relevant, short output.

  2. **Decision steps (`decision_point=true`):**
    - Read each condition in order.
    - Determine which condition logically matches based ONLY on:
        - user_input
        - chat_history
        - input_data
        - ai_instructions context
    - NEVER invent conditions.
    - ALWAYS choose exactly one condition.
    - Use the condition.next_step as returned next_step_id.
    - If next_step is null → return `"next_step_id": null`.

  3. **Action or communication steps (type=action/communication):**
    - Still follow ai_instructions.
    - Do NOT evaluate conditions unless they exist.
    - Your response_text should represent what the step "does" logically.
    - next_step_id = current_step.next_step (if defined).

  4. **If both ai_instructions and conditions exist:**
    - First generate response_text using ai_instructions.
    - Then match the correct condition based on logic.

  5. **Do not modify the workflow.**
    - You only produce an execution result for the current step.

  6. **Response must be short (1–3 lines).**

  -----------------------------------------
  ### STRICT OUTPUT FORMAT
  Return ONLY this JSON:

  {
    "response_text": "<AI-generated short response obeying ai_instructions>",
    "condition_matched": "<condition_text or null>",
    "next_step_id": <number or null>,
    "trigger_function": "<function name or null>",
    "raw_reasoning": "<1–2 line explanation of why you selected this condition or next step>"
  }
