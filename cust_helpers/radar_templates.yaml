  ## EVIDENCE PRIORITY ORDER

  1. File input links
  2. Data sources
  3. Prior RADAR outputs
  4. Reference materials (guidance only)

  Recommendations MUST be grounded in available evidence.
  If evidence is incomplete, recommendations must be **risk-aware and conditional**.

  ---
  ## RECOMMENDATION RESPONSIBILITIES

  Generate a structured recommendation document with blocks:

  1️⃣ Recommendation Intent Classification  
  2️⃣ Priority-Based Recommendations  
  3️⃣ Gap & Risk-Targeted Actions  
  4️⃣ Dependency, Validation & Prerequisite Guidance  
