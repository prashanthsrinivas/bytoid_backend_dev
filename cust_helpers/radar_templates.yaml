#   ────────────────────────────────────────────────
#   ## 🔴 STRUCTURE LOCK (ABSOLUTE AUTHORITY)

#   {{structure_file_data}} is FINAL and IMMUTABLE.

#   You MUST:

#   - Use EXACT block_ids
#   - Use EXACT titles (character-for-character)
#   - Maintain SAME order
#   - Maintain SAME block_types
#   - Maintain SAME micro_blocks
