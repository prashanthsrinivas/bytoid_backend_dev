#   • Maintain logical order EXACTLY as in the document.

#   • Extract ALL major sections including:
#     - system description
#     - scope
#     - purpose
#     - methodology / approach
#     - all tables
#     - all matrices
#     - results sections
#     - appendix / signature sections

#   ────────────────────────────────────────────────
#   🚨 SUB-SECTIONS → MICRO BLOCKS (IMPORTANT)

#   • If a section contains embedded instructions or sub-parts (e.g., assumptions, constraints, timeframe):

#     → DO NOT create a new block
#     → Place them inside parent block as micro_blocks

#   Example:
#     Scope → micro_blocks → assumptions / constraints / timeframe

#   ────────────────────────────────────────────────
#   🚨 TABLE RULES (CRITICAL)

#   • Each table MUST be its own block
#   • DO NOT merge tables
#   • DO NOT leave table micro_blocks empty

#   • Table schema MUST use object-based columns (NOT arrays)

#   REQUIRED FORMAT:

#   {
#     "type": "table_schema",
#     "columns": [
#       {
#         "name": "<column name>",
#         "type": "text | number | category",
#         "enum": [] (ONLY if category)
#       }
#     ]
#   }

#   ────────────────────────────────────────────────
#   🚨 COLUMN TYPE DETECTION (SMART)

#   Infer types as:

#   • number → numeric ranges (e.g., 0–100, scores)
#   • category → fixed labels (e.g., Very High, High, Moderate, Low)
#   • text → descriptions

#   ────────────────────────────────────────────────
#   🚨 ENUM EXTRACTION (IMPORTANT)

#   • If a column contains repeated fixed values:

#     Example:
#       Very High, High, Moderate, Low, Very Low

#     → Use:

#     {
#       "type": "category",
#       "enum": ["Very High", "High", "Moderate", "Low", "Very Low"]
#     }

#   ────────────────────────────────────────────────
#   🚨 TABLE COMPLETENESS VALIDATION (VERY IMPORTANT)

#   • Ensure ALL visible columns are extracted

#   • DO NOT miss columns (common mistake)

#   Example:
#     If table has:
#       Qualitative | Semi-Quantitative | Description

#     → ALL THREE must be present

#   ────────────────────────────────────────────────
#   🚨 MATRIX RULES (VERY IMPORTANT)

#   • If table represents cross-factor evaluation (e.g., Likelihood × Impact):

#     → block_type = matrix

#     → Use this schema:

#     {
#       "type": "matrix_schema",
#       "x_axis": {
#         "name": "<column dimension>",
#         "values": []
#       },
#       "y_axis": {
#         "name": "<row dimension>",
#         "values": []
#       },
#       "cell_value": "<meaning of cell>"
#     }

#   • DO NOT represent matrix as flat table

#   ────────────────────────────────────────────────
#   🚨 TEMPLATE DOCUMENT DETECTION

