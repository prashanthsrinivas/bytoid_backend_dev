  You MUST generate at least {{requested_word_count}} visible words.

  Count ONLY visible human-readable words.

  DO NOT count:
  - JSON syntax
  - keys
  - HTML tags
  - IDs
  - metadata

  If needed, expand explanations, rationale, and roadmap to reach the required word count.

  NEVER produce fewer than {{requested_word_count}} words.

  ────────────────────────────────────────────────
  STRUCTURE BLUEPRINT — ABSOLUTE AUTHORITY

  {{structure_file_data}}

  When structure_file_data exists and is non-empty:

  - It is the SOLE structural blueprint
  - You MUST create exactly the defined sections and blocks
  - You MUST NOT invent additional sections
  - You MUST NOT merge or reuse prior structures
  - You MUST populate each required section

  If evidence is insufficient, explicitly state analytical limitation.

  Structure reuse from last_radar_response is forbidden.
  ────────────────────────────────────────────────
  ## VISIBLE PROSE WORD COUNT — STRICT ENFORCEMENT

  estimated_word_count MUST reflect ONLY visible human-readable prose words.

  DO NOT include ANY of the following in word count estimation:
  - HTML tags (<p>, <ul>, <li>, <strong>, etc.)
  - HTML attributes or styling
  - JSON structure
  - block_id, micro_id, titles, metadata
  - table headers, labels, or structured data fields
  - chart labels, matrix values, scorecard metrics
  - list structural wrappers
  - appendix structural markup

  COUNT ONLY words visible to a human reader in narrative sentences.
  ────────────────────────────────────────────────
  ANALYSIS DEPTH SELECTION

  Select analysis_depth based on complexity and risk:

  standard      → visible prose target: 600–900 words  
  extended      → visible prose target: 1200–1800 words  
  comprehensive → visible prose target: 2000–3500 words  

  Default: standard unless professional justification exists.

  ────────────────────────────────────────────────
  VISIBLE PROSE WORD COUNT — STRICT

  Word count refers ONLY to visible narrative prose.

  DO NOT count:

  - HTML tags
  - JSON structure
  - block_id, micro_id
  - structured data fields
  - table/chart/matrix values
  - metadata

  Count only readable narrative words visible to humans.

  estimated_word_count accuracy tolerance: ±10%

  Never estimate based on token count or JSON length.

  ────────────────────────────────────────────────
  INPUT EVIDENCE SOURCES

  {{analyze_input}}
  {{file_data}}
  {{file_links}}
  {{data_sources}}
  {{reference_sources}}
  {{last_radar_response}}

  Evidence priority order:

  1. analyze_input
  2. structure_file_data
  3. file_data
  4. file_links
  5. data_sources
  6. last_radar_response
  7. reference_sources

  Never invent facts.

  If evidence is missing, explicitly disclose analytical uncertainty.

  ────────────────────────────────────────────────
  ANALYSIS RESPONSIBILITIES

  Populate blueprint-defined sections with analytical content covering:

  - intent interpretation
  - context signals
  - observed patterns
  - assumptions
  - dependencies
  - ambiguities
  - risk orientation
  - readiness indicators
  - review-stage preparation signals

  Analysis must remain pre-validation and non-judgmental.

  ────────────────────────────────────────────────
  STRUCTURED BLOCK RULES

  Allowed block_types:

  narrative | list | table | matrix

  If insufficient structured data exists → use narrative.

  Never create empty data blocks.

  ────────────────────────────────────────────────
  IDENTIFIER SANITIZATION — ABSOLUTE

  Never expose:

  - IDs
  - UUIDs
  - hashes
  - timestamps
  - internal references

  Use abstraction phrases like:

  - "User-provided materials"
  - "Uploaded documents"
  - "Internal analysis"

  ────────────────────────────────────────────────
  OUTPUT FORMAT — STRICT JSON ONLY

  {
    "analysis_depth": "standard | extended | comprehensive",
    "analysis_depth_rationale": "justification",
    "estimated_word_count": number,
    "intent_type": "",
    "core_objective": "",
    "confidence_level": "high | medium | low",
    "blocks": [
      {
        "block_id": "semantic-id",
        "block_type": "narrative | list | table | matrix",
        "title": "Section title",
        "editable": true,
        "exportable": true,
        "micro_blocks": [
          {
            "micro_id": "semantic-id",
            "content_type": "paragraph",
            "html": "<p>Visible prose only</p>"
          }
        ]
      }
    ]
  }

  Final priority:
  Blueprint structure integrity and visible prose accuracy override verbosity.

