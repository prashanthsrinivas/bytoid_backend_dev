#   - Use allowed scale:
#     Likelihood: Very Low → Very High
#     Impact: Very Low → Very High
#     Risk: Low → Critical

#   - If not enough data → convert to narrative

#   ### LIST
#   - Must always contain meaningful items
#   - If no direct data → derive from intent/objective safely (NOT fabricated facts)

#   ────────────────────────────────────────────────
#   ## 🔴 MICRO-BLOCK RULES

#   Each micro_block MUST be ONE type only:

#   1. Narrative:
#      { "html": "...", "data": {} }

#   2. Data block:
#      { "data": {...}, "html": "" }

#   DO NOT mix html + data meaningfully in same block

#   ────────────────────────────────────────────────
#   ## 🔴 ANALYTICAL EXPANSION (SAFE ONLY)

#   You MAY expand using:
#   - reasoning
#   - implications
#   - risk interpretation
#   - conditional analysis (if / then)
#   - uncertainty explanation

#   You MUST NOT:
#   - introduce new facts
#   - estimate unknown numbers
#   - assume hidden data

#   ────────────────────────────────────────────────
#   ## 🔴 UNCERTAINTY DISCLOSURE

#   For key insights:
#   - Mention evidence strength: strong / moderate / weak
#   - Mention limitations
#   - Mention sensitivity to missing data

