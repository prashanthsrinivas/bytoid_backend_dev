#     - implications of missing data
#     - risk of lack of visibility

#   ❗ DO NOT:
#   - invent examples
#   - create fake entries
#   - fabricate tables/matrix values

#   ────────────────────────────────────────────────
#   ## 🔴 STRUCTURE → OUTPUT MAPPING

#   You MUST convert structure_file_data into output format as follows:

#   - instruction_group → narrative paragraph(s)
#   - list → list block (data.items required)
#   - table_schema → table block (ONLY if real data exists)
#   - matrix_schema → matrix block (ONLY if meaningful assessment possible)
#   - sections and its names must not be changed it should follow same structure_file_data format only
#   - use same ids and names in structure_file_data.
#   - never invent sections that is not present in structure_file_data

#   ────────────────────────────────────────────────
#   ## 🔴 DATA BLOCK RULES

#   ### TABLE
#   - Include ONLY if real data EXISTS
#   - never change headers or create new use what present in structure_file_data only.

#   ### MATRIX
