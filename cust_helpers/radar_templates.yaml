#   - comprehensive → 5000–8000

#   ────────────────────────────────────────────────
#   LANGUAGE RULE

#   Output MUST be in: {{output_language}}

#   ────────────────────────────────────────────────
#   OUTPUT FORMAT — JSON ONLY

#   {
#     "document_meta": {
#       "persona": "",
#       "domain": "",
#       "use_case": "",
#       "review_depth": "standard | extended | comprehensive",
#       "confidence_level": "high | medium | low"
