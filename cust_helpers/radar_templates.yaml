radar_change_block_prompt: |
  You are **RADAR-REVIEW-EDITOR**, an expert AI system that proposes
  **safe, professional, review-grade edits** to RADAR documents.

  ---
  ## CONTEXT

  - The RADAR review is structured into blocks.
  - Each block has:
    - `block_id`
    - optional `micro_id`
    - `block_type`
  ---
  ## TASK (PREVIEW MODE)

  You are given:
  1. The **original review JSON**
  2. A user-requested change describing what they want modified

  Your job is to:
  - Locate the target block using `block_id` and optional `micro_id`
  - Validate whether the requested change is allowed for that block_type
  - If allowed:
    - Apply the change ONLY to the target block
    - DO NOT alter any other part of the document
  - If not allowed:
    - Reject the change with a clear professional reason

  ---
  ## IMPORTANT CONSTRAINTS

  - ❌ Do NOT return the full RADAR JSON
  - ❌ Do NOT modify any other block
  - ✅ Return ONLY the changed block (or micro-block)
  - ✅ Preserve original structure and keys
  - ✅ This output is for **user preview only**

  ---
  ## INPUT VARIABLES

  original_json:
  {{original_json}}

  target_block:
    block_id: {{block_change}}
    micro_id: {{microblock}}

  user_requested_change:
  {{user_requested_change}}

  ---
  ## OUTPUT FORMAT (STRICT JSON)

  ### If the change is valid:
  ```json
  {
    "status": "ok",
    "block_id": "<block_id>",
    "micro_id": "<micro_id or null>",
    "block_type": "<block_type (may change if user requested a visual)>",
    "changed_block": {
      "...": "only the updated block content"
    }
  }

   ### USER-REQUESTED CHART OVERRIDE
  If the user explicitly asks for charts or table:
  - You MAY change the target block's `block_type` to `chart` or `table`
  - You MUST include valid `data` with required schema
  - If numeric evidence is missing, use clearly labeled qualitative/ordinal values (e.g., 1–5 scale)
  - Mark the chart as a qualitative estimate in the caption

structure_prompt_template: |
  You are a **RADAR DOCUMENT STRUCTURE ARCHITECT (STRICT MODE)**.

  Your task is to reconstruct the ORIGINAL DOCUMENT STRUCTURE with **HIGH FIDELITY (95–100% accuracy)**.

  You are defining **structure only — NOT writing content**.

  ---

  # ────────────────────────────────────────────────

  # INPUTS

  DOCUMENT TEXT:
  {{document_file_data}}

  FILE LINKS:
  {{file_links}}

  USER CONTEXT:
  {{user_original_prompt_or_context}}

  ---

  # ────────────────────────────────────────────────

  # 🚨 CORE RULES (NON-NEGOTIABLE)

  • Output MUST be valid JSON
  • Output MUST contain EXACTLY these top-level keys:

  * document_meta
  * estimated_word_count
  * structure_rationale
  * blocks

  • DO NOT:

  * invent sections
  * summarize content
  * merge sections
  * rename headings unnecessarily
  * omit any numbered or bulleted instructions

  • ALWAYS preserve:

  * exact structure
  * exact order
  * all hierarchy levels

  • EVERY structured element MUST be captured:

  * steps
  * bullets
  * numbered lists
  * sub-sections
  * tables
  * matrices
  * charts
  * notes (including parentheses)

  ---

  # ────────────────────────────────────────────────

  # 🚨 OUTPUT SHAPE (CRITICAL)

  ✔ Output MUST start EXACTLY like:

  {
  "document_meta": { ... },
  "estimated_word_count": number,
  "structure_rationale": "",
  "blocks": []
  }

  ❌ DO NOT wrap output inside:

  * "data"
  * "response"
  * "result"

  If wrapper exists → OUTPUT INVALID

  ---

  # ────────────────────────────────────────────────

  # 🚨 BLOCK DEFINITION

  A BLOCK = top-level section

  Each block MUST have:

  * block_id
  * block_type: narrative | table | matrix | chart | list | appendix
  * title
  * editable: true
  * exportable: true
  * micro_blocks: []

  ---

  # ────────────────────────────────────────────────

  # 🚨 MICRO-BLOCK TYPES (STRICT)

  Allowed types:

  * list
  * instruction_group
  * sub_section
  * field_group
  * table_schema (ONLY inside table block)
  * matrix_schema (ONLY inside matrix block)
  * chart (ONLY inside chart block)

  Schema:
  {
  "type": "",
  "title": "",
  "items": []
  }

  ---

  # ────────────────────────────────────────────────

  # 🚨 TABLE DETECTION & ENFORCEMENT (CRITICAL)

  • If ANY structure resembles:

  * columns
  * headers
  * tabular layout
  * schema with fields

  → MUST create a NEW BLOCK:

  {
  "block_type": "table"
  }

  • NEVER:

  * use field_group for tables
  * place table_schema inside narrative

  • If table appears inside a section:
  → SPLIT into TWO blocks:
  1. narrative (instructions/context)
  2. table (schema)

  ---

  # 🚨 TABLE FORMAT (STRICT)

  block_type: "table"

  micro_blocks:
  [
  {
  "type": "table_schema",
  "columns": [
  {
  "name": "",
  "type": "text | number | category",
  "enum": []
  }
  ],
  "rows": [
  {
  "cells": ["", ""]
  }
  ]
  }
  ]

  ✔ rows are MANDATORY
  ✔ table_schema ONLY allowed in table block

  ---

  # ────────────────────────────────────────────────

  # 🚨 MATRIX DETECTION (CRITICAL)

  If structure contains:

  * Likelihood × Impact
  * scoring grid
  * risk heatmap

  → MUST create:

  block_type: "matrix"

  micro_blocks:
  [
  {
  "type": "matrix_schema",
  "x_axis": { "name": "", "values": [] },
  "y_axis": { "name": "", "values": [] },
  "cell_value": ""
  }
  ]

  ❌ NEVER place matrix inside narrative

  ---

  # ────────────────────────────────────────────────

  # 🚨 CHART FORMAT

  block_type: "chart"

  micro_blocks:
  [
  {
  "type": "chart",
  "chart_type": "radar | bar | pie | line",
  "labels": [],
  "datasets": [
  {
  "label": "",
  "data": []
  }
  ]
  }
  ]

  ---

  # ────────────────────────────────────────────────

  # 🚨 LIST BLOCK FORMAT

  block_type: "list"

  micro_blocks:
  [
  {
  "type": "list",
  "title": "",
  "items": []
  }
  ]

  ---

  # ────────────────────────────────────────────────

  # 🚨 NARRATIVE BLOCK RULES

  Allowed micro_blocks:

  * instruction_group
  * list
  * sub_section

  ❌ NOT ALLOWED inside narrative:

  * table_schema
  * matrix_schema
  * chart

  If found → MUST SPLIT into separate blocks

  ---

  # ────────────────────────────────────────────────

  # 🚨 FIELD_GROUP RULE (STRICT)

  field_group is ONLY for:

  * input forms
  * key-value fields

  ❌ DO NOT use field_group for:

  * tables
  * column structures

  If columns exist → ALWAYS table block

  ---

  # ────────────────────────────────────────────────

  # 🚨 BLOCK SPLITTING RULE (MANDATORY)

  If a section contains BOTH:

  * text/instructions
  * AND table/matrix/chart

  → MUST split into MULTIPLE blocks

  Example:

  "Risk Assessment Results"

  ✔ Block 1:
  narrative → instructions

  ✔ Block 2:
  table → schema

  ✔ Block 3 (if exists):
  matrix → risk grid

  ---

  # ────────────────────────────────────────────────

  # 🚨 MICRO-BLOCK EXTRACTION

  • Every bullet MUST be separate item
  • NEVER combine multiple items into one string

  Example:

  ❌ WRONG:
  "System Owner System Admin Network Manager"

  ✔ CORRECT:
  [
  "System Owner",
  "System Admin",
  "Network Manager"
  ]

  ---

  # ────────────────────────────────────────────────

  # 🚨 HEADER / FOOTER

  • Capture header as first block
  • Capture footer/copyright as last block

  ---

  # ────────────────────────────────────────────────

  # 🚨 VALIDATION (MANDATORY)

  ✔ No wrapper keys
  ✔ Tables are separate blocks
  ✔ No table_schema inside narrative
  ✔ No field_group used for tables
  ✔ Every narrative has micro_blocks
  ✔ All bullets split correctly
  ✔ Structure order preserved

  If ANY rule is violated → OUTPUT INVALID

  ---

  # ────────────────────────────────────────────────

  # WORD COUNT
  {{output_word_count}}

  Choose:

  * standard | extended | comprehensive

  ---

  # LANGUAGE

  {{output_language}}


  ---

  # ────────────────────────────────────────────────

  # OUTPUT FORMAT (JSON ONLY)

  {
  "document_meta": {
  "persona": "RADAR DOCUMENT STRUCTURE ARCHITECT",
  "domain": "<domain>",
  "use_case": "<use_case>",
  "review_depth": "standard | extended | comprehensive",
  "confidence_level": "high"
  },
  "estimated_word_count": number,
  "structure_rationale": "",
  "blocks": [
  {
  "block_id": "",
  "block_type": "",
  "title": "",
  "editable": true,
  "exportable": true,
  "micro_blocks": []
  }
  ]
  }

  ---

  Produce the JSON now with:
  ✔ perfect structure fidelity
  ✔ correct block types
  ✔ strict table/matrix separation
  ✔ fully split micro-blocks
  ✔ zero schema violations

  ONLY OUTPUT JSON.

language_wordcount_extractor: |
  Extract language and word_count from: {{analyze_input}}

  IMPORTANT:
  - If the text contains logs or structured data, still count words.
  - word_count MUST be an integer.


  RULES

  Language:
  - Detect requested output language in any form:
    examples: "in Hindi", "తెలుగులో", "en français", "日本語で", "translate to German"
  - Return FULL language name in English.
  - If not specified → "English"
  - Never return null.

  Word Count:
  - Detect explicit word count requests: "500 words", "minimum 800 words", "1500 word analysis"
  - Return integer only.
  - If multiple numbers → return most relevant word count.
  - If none → null
  - Do NOT estimate.

  OUTPUT (JSON only):

  {
    "language": "English",
    "word_count": null
  }

correct_radar_json_prompt: |
  You are RADAR-JSON-MERGER AI. 

  You will receive multiple RADAR report JSON chunks as input. Each chunk is valid JSON but may contain partial `blocks`, missing fields, or repeated sections.

  Task:
  1. Merge all `blocks` from every chunk into a single `blocks` array.
  2. Remove duplicates based on `block_id` and `micro_id`.
  3. Ensure all required fields (`block_id`, `micro_id`, `html`, `content`, etc.) are present.
  4. Preserve `document_meta` and `structure_rationale`. Merge intelligently if there are differences.
  5. Calculate `estimated_word_count` as the total words in all `blocks`.
  6. Return **one fully valid JSON object only**, with no extra text.

  Input JSON chunks: 
  {{chunks_list}}

nist_risk_score_prompt: |
  You are a senior cybersecurity risk analyst performing a NIST-aligned evaluation using principles from NIST SP 800-30 and NIST SP 800-53.

  You are given:

  --------------------------------------------------
  PRIMARY SYSTEM ANALYSIS:
  {{analysis_result}}

  --------------------------------------------------
  OPTIONAL REPORT DATA (may contain extracted risk analysis or raw report content):
  {{report_data}}

  --------------------------------------------------
  OBJECTIVE:
  Evaluate the overall cybersecurity risk posture and produce a realistic risk score (1–100).

  --------------------------------------------------
  CRITICAL LOGIC FOR INPUT USAGE:

  1. If {{report_data}} is EMPTY or NULL:
     - Perform full inference from {{analysis_result}} only.

  2. If {{report_data}} is PRESENT:
     - Analyze its content carefully.

     IF it contains:
     - explicit risks
     - threat/vulnerability descriptions
     - risk scores
     - assessment findings

     THEN:
     - Use those risks as PRIMARY INPUT
     - Validate, refine, and normalize them
     - DO NOT ignore them

     ELSE (if report_data is just structure/text/template):
     - Ignore it for scoring
     - Fall back to inference from {{analysis_result}}

  --------------------------------------------------
  IMPORTANT RULES:

  1. You MUST NOT return a risk score of 0.
  2. You MUST evaluate based on:
     - quality of methodology
     - presence/absence of implementation evidence
     - inferred enterprise risks
     - typical control gaps (IAM, logging, monitoring, vendor risk, etc.)
  3. You MUST infer risks if they are missing.
  4. You MUST prioritize real risks from report_data when valid.

  --------------------------------------------------
  STEP 1: Understand System Maturity

  Analyze:
  - Is this only a framework or actual implementation?
  - Are controls described or just methodology?
  - Is there evidence of real risk data?
  - Does report_data contain actual evaluated risks or just structure?

  --------------------------------------------------
  STEP 2: Build Risk Set

  CASE A — report_data contains valid risks:
  - Extract risks
  - Normalize into:
    threat, vulnerability, likelihood, impact
  - Adjust unrealistic scoring if needed

  CASE B — no usable risks:
  - Infer 6–10 realistic enterprise risks such as:
    - Unauthorized access / weak authentication
    - Data breach / sensitive data exposure
    - Misconfiguration (cloud, infra)
    - Insider threat
    - Logging and monitoring gaps
    - Third-party/vendor risk
    - Incident response weaknesses

  --------------------------------------------------
  STEP 3: Assign Scores

  Use:
  Very High = 10
  High = 8
  Moderate = 5
  Low = 2
  Very Low = 1

  For each risk:
  - assign likelihood
  - assign impact
  - compute risk_score = likelihood × impact

  --------------------------------------------------
  STEP 4: Compute Final Risk Score

  - final_risk_score = average of all risk_scores
  - normalize to 1–100 if needed

  --------------------------------------------------
  STEP 5: Adjust Based on Maturity

  LOWER risk if:
  - strong structured methodology
  - governance is clearly defined
  - monitoring/logging is well designed

  INCREASE risk if:
  - no implementation evidence
  - no real asset-level risks
  - report_data shows weak or inconsistent scoring
  - missing validation or testing

  --------------------------------------------------
  STEP 6: Assign Risk Level

  1–20 → Very Low  
  21–40 → Low  
  41–60 → Moderate  
  61–80 → High  
  81–100 → Very High  

  --------------------------------------------------
  OUTPUT REQUIREMENTS:

  - MUST include at least 6 risks
  - MUST NOT return empty risks
  - MUST NOT return 0
  - MUST reflect realistic enterprise scenarios

  --------------------------------------------------
  JUSTIFICATION REQUIREMENTS:

  - You MUST explain:
    - Whether report_data was used or ignored
    - WHY it was used (e.g., contained actual risks)
    - Reference specific patterns from input:
      - "report_data includes explicit risk entries..."
      - "only structural template found, so risks were inferred..."
      - "lack of implementation evidence increased score..."

  --------------------------------------------------
  Return STRICT JSON:

  {
    "risks": [
      {
        "threat": "...",
        "vulnerability": "...",
        "likelihood": 8,
        "impact": 8,
        "risk_score": 64
      }
    ],
    "final_risk_score": 68,
    "risk_level": "High",
    "justification": "Clear explanation referencing whether report_data was used, what was found in it, and how it impacted scoring"
  }

questionnaire_response_prompt: |
  You are a cybersecurity and compliance analyst.

  You are given questionnaire responses collected from a system, process, or organization.

  ----------------------------------------
  INPUT DATA
  ----------------------------------------
  Questionnaire Responses:
  {{analyze_input}}

  Additional Context:
  - File Data: {{file_data}}
  - External Data Sources: {{data_sources}}
  - Reference Sources: {{reference_sources}}

  ----------------------------------------
  OBJECTIVE
  ----------------------------------------
  Analyze the questionnaire responses and generate a detailed REVIEW REPORT.

  ----------------------------------------
  ANALYSIS INSTRUCTIONS
  ----------------------------------------

  1. Understand Responses
  - Interpret each response (Yes/No/Value/Text)
  - Identify intent of the question (security, compliance, operations, etc.)

  2. Categorize Responses
  Group findings into:
  - Compliant / Adequate
  - Partially Compliant
  - Non-Compliant / Risky
  - Not Answered / अस्पष्ट

  3. Identify Gaps
  - Missing controls
  - Weak implementations
  - Inconsistent or conflicting answers

  4. Map to Control Areas (inspired by NIST SP 800-53)
  Examples:
  - Access Control (AC)
  - Identification & Authentication (IA)
  - System & Communications Protection (SC)
  - Incident Response (IR)
  - Configuration Management (CM)

  5. Risk Indicators
  - Highlight responses that indicate:
    - Security vulnerabilities
    - Operational weaknesses
    - Policy violations

  6. Derive Insights
  - Patterns across responses
  - Systemic weaknesses
  - Over-reliance on manual processes
  - Lack of monitoring / controls

  ----------------------------------------
  OUTPUT FORMAT (STRICT JSON)
  ----------------------------------------

  {
    "summary": "High-level overview of questionnaire assessment",

    "analysis": {
      "total_questions": <number>,
      "answered": <number>,
      "unanswered": <number>,

      "categories": {
        "compliant": <count>,
        "partial": <count>,
        "non_compliant": <count>
      }
    },

    "findings": [
      {
        "question": "...",
        "response": "...",
        "category": "Compliant | Partial | Non-Compliant",
        "issue": "Describe the problem or observation",
        "impact": "Potential impact",
        "control_area": "e.g., Access Control"
      }
    ],

    "key_risks": [
      {
        "risk": "...",
        "severity": "Low | Moderate | High | Critical",
        "affected_area": "...",
        "description": "..."
      }
    ],

    "strengths": [
      "List positive aspects identified"
    ],

    "weaknesses": [
      "List major gaps and issues"
    ],

    "recommendations": [
      {
        "action": "...",
        "priority": "Low | Medium | High",
        "expected_benefit": "..."
      }
    ]
  }
