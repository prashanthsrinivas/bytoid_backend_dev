#   21–40 → Low
#   41–60 → Moderate
#   61–80 → High
#   81–100 → Very High

#   --------------------------------------------------
#   OUTPUT REQUIREMENTS:

#   - MUST include at least 6 risks
#   - MUST NOT return empty risks
#   - MUST NOT return 0
#   - MUST reflect realistic enterprise scenarios

#   --------------------------------------------------

#   Return STRICT JSON:

#   {
#     "risks": [
#       {
