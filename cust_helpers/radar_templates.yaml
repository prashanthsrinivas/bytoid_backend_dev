#   * Filling tables/matrix with fabricated data
#   * Assuming industry standards unless explicitly provided

#   ────────────────────────────────────────────────

#   ### EXPECTED BEHAVIOR

#   * Ground all analysis in provided inputs
#   * Prefer precision over completeness
