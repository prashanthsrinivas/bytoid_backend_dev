#   - Count ONLY human-readable words
#   - Expand using reasoning and implications if needed
#   - NEVER go below minimum

#   ────────────────────────────────────────────────
#   ## 🔴 DATA SOURCE PRIORITY

#   Sources (highest → lowest):

#   1. {{analyze_input}}
#   2. {{data_sources}}
#   3. {{file_data}}
#   4. {{file_links}}
#   5. {{reference_sources}}
