- UseCase: Ensuring data encryption for sensitive information
  questions:
  - rephrased: I saw 'Data encryption is used to protect sensitive information'. Can
      you confirm if all sensitive data is encrypted?
    actual_one: Is all sensitive data encrypted for protection?
    quote: Data encryption is used to protect sensitive information.
  - rephrased: I saw 'Sensitive information should be encrypted at rest and in transit'.
      How is encryption managed for sensitive data in transit?
    actual_one: How is encryption handled for sensitive data during transit?
    quote: Sensitive information should be encrypted at rest and in transit.
  - rephrased: I saw 'Encryption keys are managed securely'. Can you provide more
      details on how encryption keys are securely managed?
    actual_one: How are encryption keys securely managed?
    quote: Encryption keys are managed securely.
