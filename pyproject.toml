# Phase 0 subset — pytest, coverage, and bare-minimum tool configs.
# Later phases will add [tool.mypy], expanded [tool.ruff.lint], [tool.bandit],
# [tool.pylint], etc. We keep the file present from Phase 0 so subsequent
# phases just edit it rather than introducing yet another config file.

[tool.pytest.ini_options]
# Mirrors pytest.ini (kept as the canonical for now to preserve historical
# behaviour). When/if pytest.ini is removed, the values below take over.
testpaths = ["tests", "testing"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--json-report",
    "--json-report-file=testing/results/latest.json",
]
markers = [
    "security: security-focused tests (auth, RBAC, injection, etc.)",
    "regression: regression tests for previously fixed defects",
    "integration: cross-component integration tests",
    "e2e: end-to-end user-journey tests",
    "fuzz: property-based / fuzz tests via Hypothesis",
    "concurrency: race-condition / threading tests",
    "chaos: fault-injection / chaos tests",
    "slow: tests that take > 1s; skipped by default in local quick runs",
    "live_llm: hits real LLM endpoints; gated by RUN_LIVE_LLM=1",
]

[tool.coverage.run]
branch = true
source = ["."]
# Skip the repos we definitely don't want to measure.
omit = [
    "tests/*",
    "testing/*",
    "venv/*",
    ".venv/*",
    "logs/*",
    "scripts/*",
    "*/__pycache__/*",
    # Top-level utility scripts that aren't part of the served app.
    "find_admin_change.py",
]

[tool.coverage.report]
# Phase 0 baseline: no fail-under yet. Phase 6 ratchets this up.
show_missing = true
skip_covered = false
precision = 1
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]

[tool.coverage.html]
directory = "htmlcov"
title = "Bytoid backend coverage"

[tool.coverage.xml]
output = "coverage.xml"

# ── Phase 2 — Type Safety ─────────────────────────────────────────────────

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_configs = true
pretty = true
show_error_codes = true
strict = false

# Strict untyped-def checking for the modules we own end-to-end.
# Add more modules as the codebase gains type annotations.
[[tool.mypy.overrides]]
module = [
    "tests_routes.*",
    "services.audit_log_service",
    "utils.permission_required",
    "services.totp_service",
]
disallow_untyped_defs = true
warn_return_any = true

# ── Phase 2 — Lint (ruff extended ruleset) ────────────────────────────────

[tool.ruff]
line-length = 120

[tool.ruff.lint]
# S  = flake8-bandit (security), B = bugbear, RUF = ruff-native, ASYNC = async safety.
# These are additive over ruff's default E/F/W set.
extend-select = ["S", "B", "RUF", "ASYNC"]
ignore = [
    "S101",   # assert — acceptable in tests
    "S104",   # bind to 0.0.0.0 — intentional in app.py
    "S107",   # hardcoded-password string — high FP rate
    "S311",   # non-crypto random — OK outside security paths
    "S603",   # subprocess with list args — safe by design
    "S607",   # partial path to executable — acceptable in tooling
    "B007",   # loop variable not used in body — minor style
    "B008",   # function call in default arg — Flask idiom (e.g. request)
    "RUF012", # mutable class-level attribute annotation — too noisy
]

[tool.bandit]
# Mirrors bandit.yaml; pyproject.toml form takes precedence when both exist.
exclude_dirs = [
    "venv",
    ".venv",
    "env",
    "node_modules",
    "logs",
    "testing/results",
    "htmlcov",
    ".pytest_cache",
    ".ruff_cache",
    ".mypy_cache",
    "dist",
    "build",
]
# B101 (assert_used) is too noisy across the test corpus; we keep `assert`
# semantics meaningful in production code via review, not via Bandit.
skips = ["B101"]

# Phase 1 security thresholds. The CI workflow reads these to decide whether
# a build fails on bandit/semgrep/gitleaks output. Non-protected paths run
# warn-only initially; protected paths block from day 1 (the guardrail
# overrides these defaults for protected files).
[tool.security]
fail_on_sast = "warn"        # Phase 1 warn-only for non-protected paths
fail_on_secrets = "any"      # gitleaks/trufflehog: blocking from Phase 1
fail_on_dep_cve = "warn"     # Phase 1 warn-only for non-protected paths
fail_on_coverage_drop = 5.0  # percent; Phase 1 lenient, ratcheted in Phase 6

[tool.security.protected]
# Stricter overrides for diffs touching security/protected_modules.yml paths.
# These are NOT warn-only.
fail_on_sast = "high"
fail_on_secrets = "any"
fail_on_dep_cve = "high"
fail_on_coverage_drop = 0.0
