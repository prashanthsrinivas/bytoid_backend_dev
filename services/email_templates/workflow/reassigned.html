<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:Arial,sans-serif;color:#333;line-height:1.6">
<p>Hi {{ recipient_name }},</p>
<p><strong>{{ admin_name }}</strong> assigned you as <strong>{{ role }}</strong>
for <em>"{{ doc_title }}"</em> (v{{ doc_version }}).</p>
{% if comment %}
<blockquote style="border-left:3px solid #ccc;padding-left:12px;color:#555">
  Reason: "{{ comment }}"
</blockquote>
{% endif %}
<p><a href="{{ link }}" style="background:#2563EB;color:#fff;padding:10px 20px;text-decoration:none;border-radius:4px">Open Document</a></p>
<p style="color:#888;font-size:12px">— Bytoid</p>
</body>
</html>
